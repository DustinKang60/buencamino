<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f1117"/>
<link rel="manifest" href="manifest.json"/>
<title>Buen Camino</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f1117;--surface:#1a1d2e;--surface2:#232640;--surface3:#2d3154;
  --border:#2d3154;--border2:#3d4470;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#6366f1;--accent2:#818cf8;--accent-bg:#1e1f3a;
  --green:#10b981;--green-bg:#0d2a1f;
  --red:#ef4444;--red-bg:#2a0d0d;
  --amber:#f59e0b;--amber-bg:#2a1f0d;
  --blue:#3b82f6;--blue-bg:#0d1a2a;
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
  --ff:'Noto Sans KR',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ff);}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}

/* ── Nav ── */
.nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;
  border:none;background:none;color:var(--text3);font-family:var(--ff);font-size:10px;cursor:pointer;transition:color .15s;}
.nav-btn.active{color:var(--accent2);}
.nav-btn .icon{font-size:22px;}

/* ── TopBar ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;
  height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  padding-top:env(safe-area-inset-top);}
.topbar h1{font-size:17px;font-weight:700;color:var(--text);}
.topbar-left,.topbar-right{min-width:60px;display:flex;align-items:center;}
.topbar-right{justify-content:flex-end;}

/* ── Scroll Area ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}

/* ── Buttons ── */
.btn{border:none;border-radius:var(--radius-sm);padding:10px 18px;cursor:pointer;
  font-family:var(--ff);font-size:14px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:active{filter:brightness(.85);}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-ghost:active{filter:brightness(.85);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.btn-icon{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:6px;}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;}
.card:active{opacity:.85;}

/* ── Form ── */
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;color:var(--text3);margin-bottom:6px;display:block;font-weight:500;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;color:var(--text);font-family:var(--ff);font-size:16px;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text3);}
textarea.form-input{resize:none;min-height:80px;}
select.form-input{appearance:none;-webkit-appearance:none;}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;font-family:var(--ff);}
.chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2);}

/* ── Bottom Sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;
  align-items:flex-end;justify-content:center;}
.sheet{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding:12px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text);}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-accent{background:var(--accent-bg);color:var(--accent2);}

/* ── Calendar ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-label{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;}
.cal-day{text-align:center;padding:6px 0;border-radius:8px;font-size:13px;cursor:pointer;
  position:relative;transition:background .12s;}
.cal-day:active{background:var(--surface3);}
.cal-day.today{color:var(--accent2);font-weight:700;}
.cal-day.selected{background:var(--accent);color:#fff;font-weight:700;}
.cal-day.has-data::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--green);}
.cal-day.has-data.selected::after{background:#fff;}
.cal-day.other-month{color:var(--text3);}

/* ── Amount ── */
.amount-big{font-size:28px;font-weight:700;color:var(--text);}
.amount-sub{font-size:13px;color:var(--text3);}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:12px 0;}

/* ── Toggle ── */
.toggle{background:none;border:none;border-radius:20px;width:48px;height:28px;cursor:pointer;
  position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--accent);}
.toggle.off{background:var(--border2);}
.toggle-knob{width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:3px;
  transition:left .2s;}
.toggle.on .toggle-knob{left:23px;}
.toggle.off .toggle-knob{left:3px;}

/* ── Summary Row ── */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;}
.sum-row .label{font-size:13px;color:var(--text2);}
.sum-row .value{font-size:14px;font-weight:600;color:var(--text);}

/* ── Progress bar ── */
.progress{height:6px;border-radius:3px;background:var(--surface2);overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .3s;}

/* ── Photo grid ── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.photo-thumb{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;}
.photo-add{aspect-ratio:1;border-radius:8px;border:2px dashed var(--border2);display:flex;
  align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:28px;}

/* ── Expense item ── */
.exp-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.exp-item:last-child{border-bottom:none;}
.exp-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;}
.exp-info{flex:1;min-width:0;}
.exp-title{font-size:14px;font-weight:500;color:var(--text);}
.exp-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.exp-amount{text-align:right;flex-shrink:0;}
.exp-krw{font-size:14px;font-weight:600;color:var(--text);}
.exp-local{font-size:11px;color:var(--text3);}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:15px;margin-bottom:8px;color:var(--text2);}
.empty-sub{font-size:13px;}

/* ── Screen ── */
.screen{display:none;flex-direction:column;height:100%;}
.screen.active{display:flex;}

/* ── Transitions ── */
.fade-in{animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Loader ── */
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Section header ── */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 8px;}
.section-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
</style>
</head>
<body>
<div id="app">

<!-- ═══════════════════════════════════════
     SCREEN: HOME (Project List)
═══════════════════════════════════════ -->
<div class="screen active" id="screen-home">
  <div class="topbar">
    <div class="topbar-left"></div>
    <h1>✈️ Buen Camino</h1>
    <div class="topbar-right">
      <button class="btn-icon" onclick="openNewProject()">＋</button>
    </div>
  </div>
  <div class="scroll" style="padding:16px;">
    <div id="project-list"></div>
    <div id="home-empty" class="empty" style="display:none;">
      <div class="empty-icon">🗺️</div>
      <div class="empty-text">여행 프로젝트가 없습니다</div>
      <div class="empty-sub">＋ 버튼을 눌러 새 여행을 시작하세요</div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showHome()"><span class="icon">🏠</span>홈</button>
    <button class="nav-btn" onclick="showStats()"><span class="icon">📊</span>통계</button>
    <button class="nav-btn" onclick="showSettings()"><span class="icon">⚙️</span>설정</button>
  </nav>
</div>

<!-- ═══════════════════════════════════════
     SCREEN: PROJECT DETAIL (Calendar)
═══════════════════════════════════════ -->
<div class="screen" id="screen-project">
  <div class="topbar">
    <div class="topbar-left">
      <button class="btn-icon" onclick="goHome()">‹</button>
    </div>
    <h1 id="proj-title">여행</h1>
    <div class="topbar-right">
      <button class="btn-icon" onclick="openSettle()">💰</button>
    </div>
  </div>
  <div class="scroll" style="padding:16px;">
    <!-- Summary strip -->
    <div id="proj-summary"></div>
    <!-- Calendar -->
    <div class="card">
      <div class="cal-header">
        <button class="btn-icon" onclick="calPrev()">‹</button>
        <span id="cal-month" style="font-weight:700;font-size:15px;"></span>
        <button class="btn-icon" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-labels"></div>
      <div class="cal-grid" id="cal-grid" style="margin-top:4px;"></div>
    </div>
    <!-- Day detail -->
    <div id="day-panel" style="display:none;" class="fade-in">
      <div class="section-header">
        <span class="section-title" id="day-label"></span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" style="padding:6px 12px;font-size:13px;" onclick="openDiary()">📖 일기</button>
          <button class="btn btn-primary" style="padding:6px 12px;font-size:13px;" onclick="openAddExpense()">＋ 지출</button>
        </div>
      </div>
      <div id="day-expenses"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     SCREEN: STATS
═══════════════════════════════════════ -->
<div class="screen" id="screen-stats">
  <div class="topbar">
    <div class="topbar-left"></div>
    <h1>📊 통계</h1>
    <div class="topbar-right"></div>
  </div>
  <div class="scroll" style="padding:16px;">
    <div id="stats-content"></div>
  </div>
  <nav class="nav">
    <button class="nav-btn" onclick="showHome()"><span class="icon">🏠</span>홈</button>
    <button class="nav-btn active" onclick="showStats()"><span class="icon">📊</span>통계</button>
    <button class="nav-btn" onclick="showSettings()"><span class="icon">⚙️</span>설정</button>
  </nav>
</div>

<!-- ═══════════════════════════════════════
     SCREEN: SETTINGS
═══════════════════════════════════════ -->
<div class="screen" id="screen-settings">
  <div class="topbar">
    <div class="topbar-left"></div>
    <h1>⚙️ 설정</h1>
    <div class="topbar-right"></div>
  </div>
  <div class="scroll" style="padding:16px;">
    <div id="settings-content"></div>
  </div>
  <nav class="nav">
    <button class="nav-btn" onclick="showHome()"><span class="icon">🏠</span>홈</button>
    <button class="nav-btn" onclick="showStats()"><span class="icon">📊</span>통계</button>
    <button class="nav-btn active" onclick="showSettings()"><span class="icon">⚙️</span>설정</button>
  </nav>
</div>

<!-- ═══════════════════════════════════════
     OVERLAYS (Sheets)
═══════════════════════════════════════ -->
<div id="overlay-root"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DATA MODEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const KEY = 'buencamino_v1';
let db = load();

function load(){
  try{
    const r=localStorage.getItem(KEY);
    return r?JSON.parse(r):defaultDB();
  }catch{return defaultDB();}
}
function save(){
  localStorage.setItem(KEY,JSON.stringify(db));
}
function defaultDB(){
  return{
    projects:[],
    friends:[],
    expenseCategories:defaultCategories(),
    settings:{currency:'KRW',theme:'dark'}
  };
}
function defaultCategories(){
  return[
    {id:'transport',name:'교통',icon:'🚌',group:'기본'},
    {id:'food',name:'식비',icon:'🍽️',group:'기본'},
    {id:'lodging',name:'숙박',icon:'🏨',group:'기본'},
    {id:'shopping',name:'쇼핑',icon:'🛍️',group:'기본'},
    {id:'attraction',name:'관광',icon:'🎫',group:'기본'},
    {id:'misc',name:'기타',icon:'💡',group:'기본'},
    {id:'golf_green',name:'그린피',icon:'⛳',group:'골프'},
    {id:'golf_caddie',name:'캐디피',icon:'🏌️',group:'골프'},
    {id:'golf_cart',name:'카트피',icon:'🛺',group:'골프'},
    {id:'golf_insurance',name:'골프보험',icon:'🛡️',group:'골프'},
    {id:'golf_food',name:'클럽하우스 식비',icon:'🍱',group:'골프'},
  ];
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentProject=null;
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();
let selectedDate=null;
let editExpense=null;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SCREEN ROUTER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
function showHome(){showScreen('home');renderHome();}
function showStats(){showScreen('stats');renderStats();}
function showSettings(){showScreen('settings');renderSettings();}
function goHome(){showHome();}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HOME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderHome(){
  const list=document.getElementById('project-list');
  const empty=document.getElementById('home-empty');
  if(!db.projects.length){list.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  list.innerHTML=db.projects.map(p=>{
    const total=projectTotalKRW(p);
    const days=p.days?Object.keys(p.days).length:0;
    const typeLabel={solo:'나홀로',group:'동반자',package:'패키지'}[p.type]||p.type;
    const typeColor={solo:'badge-blue',group:'badge-green',package:'badge-amber'}[p.type]||'badge-accent';
    return`<div class="card" style="cursor:pointer;border-left:4px solid var(--accent);" onclick="openProject('${p.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;">${p.flag||'🌍'} ${p.name}</div>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            <span class="badge ${typeColor}">${typeLabel}</span>
            ${p.country?`<span style="font-size:12px;color:var(--text3);">${p.country}</span>`:''}
            <span style="font-size:12px;color:var(--text3);">${p.startDate||'날짜 미정'}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px;">
          <div style="font-size:15px;font-weight:700;color:var(--text);">${fmtKRW(total)}</div>
          <div style="font-size:11px;color:var(--text3);">${days}일 기록</div>
        </div>
      </div>
      ${p.members&&p.members.length?`<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;">
        ${p.members.map(m=>`<span style="font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:2px 8px;color:var(--text2);">${m}</span>`).join('')}
      </div>`:''}
    </div>`;
  }).join('');
}

function projectTotalKRW(p){
  if(!p.days)return 0;
  return Object.values(p.days).reduce((s,d)=>{
    const exps=d.expenses||[];
    return s+exps.reduce((a,e)=>a+(e.amountKRW||0),0);
  },0);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NEW PROJECT SHEET
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openNewProject(){
  const friends=db.friends;
  showSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">새 여행 프로젝트</div>
    <div class="form-group">
      <label class="form-label">여행 이름</label>
      <input class="form-input" id="np-name" placeholder="예: 도쿄 벚꽃 여행" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="font-size:16px;"/>
    </div>
    <div class="form-group">
      <label class="form-label">여행 유형</label>
      <div class="chips" id="np-type-chips">
        <button class="chip active" data-v="solo" onclick="pickChip(this,'np-type-chips')">🙋 나홀로</button>
        <button class="chip" data-v="group" onclick="pickChip(this,'np-type-chips')">👥 동반자</button>
        <button class="chip" data-v="package" onclick="pickChip(this,'np-type-chips')">🎒 패키지</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">국가 / 지역</label>

let tempMembers=[];
function addMemberToList(){
  const inp=document.getElementById('np-member-input');
  const name=inp.value.trim();
  if(!name)return;
  if(!tempMembers.includes(name))tempMembers.push(name);
  inp.value='';
  renderTempMembers();
}
function removeMember(name){
  tempMembers=tempMembers.filter(m=>m!==name);
  renderTempMembers();
}
function renderTempMembers(){
  const el=document.getElementById('np-member-list');
  if(!el)return;
  el.innerHTML=tempMembers.map(m=>`<span style="background:var(--accent-bg);border:1px solid var(--accent);border-radius:12px;padding:4px 10px;font-size:13px;color:var(--accent2);display:flex;align-items:center;gap:4px;">
    ${m}<button onclick="removeMember('${m}')" style="background:none;border:none;color:var(--accent2);cursor:pointer;font-size:14px;padding:0;">✕</button>
  </span>`).join('');
}

function saveNewProject(){
  const name=document.getElementById('np-name').value.trim();
  if(!name)return alert('여행 이름을 입력하세요.');
  const type=getActiveChip('np-type-chips');
  const country=document.getElementById('np-country').value.trim();
  const currency=document.getElementById('np-currency').value;
  const start=document.getElementById('np-start').value;
  const catGroup=getActiveChip('np-cat-chips');

  // Friends from chips
  const friendChips=document.querySelectorAll('#np-friend-chips .chip.active');
  const fromChips=[...friendChips].map(c=>c.dataset.v);
  const allMembers=[...new Set([...fromChips,...tempMembers])];

  // Add new friends to db
  allMembers.forEach(m=>{if(!db.friends.includes(m))db.friends.push(m);});

  const flags={일본:'🇯🇵',프랑스:'🇫🇷',이탈리아:'🇮🇹',스페인:'🇪🇸',미국:'🇺🇸',영국:'🇬🇧',태국:'🇹🇭',베트남:'🇻🇳',대만:'🇹🇼',홍콩:'🇭🇰',싱가포르:'🇸🇬',중국:'🇨🇳',말레이시아:'🇲🇾'};
  const flag=Object.entries(flags).find(([k])=>country.includes(k))?.[1]||'🌍';

  const proj={
    id:uid(),name,type,country,currency,startDate:start,members:allMembers,
    catGroup,flag,days:{},createdAt:Date.now()
  };
  db.projects.unshift(proj);
  tempMembers=[];
  save();
  closeSheet();
  openProject(proj.id);
}

  selectedDate=null;
  const sd=currentProject.startDate?new Date(currentProject.startDate):new Date();
  calYear=sd.getFullYear();calMonth=sd.getMonth();
  showScreen('project');
  document.getElementById('proj-title').textContent=currentProject.flag+' '+currentProject.name;
  renderProjectSummary();
  renderCalendar();
  document.getElementById('day-panel').style.display='none';

  const p=currentProject;

// CALENDAR
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCalendar(){
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month').textContent=`${calYear}년 ${monthNames[calMonth]}`;

  const labels=document.getElementById('cal-labels');
  const grid=document.getElementById('cal-grid');
  const dayNames=['일','월','화','수','목','금','토'];
  labels.innerHTML=dayNames.map(d=>`<div class="cal-day-label">${d}</div>`).join('');

  const first=new Date(calYear,calMonth,1).getDay();
  const last=new Date(calYear,calMonth+1,0).getDate();
  const todayStr=today();
  const p=currentProject;

  let html='';
  for(let i=0;i<first;i++){
    const d=new Date(calYear,calMonth,-(first-1-i));
    html+=`<div class="cal-day other-month">${d.getDate()}</div>`;
  }
  for(let d=1;d<=last;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    const isSel=dateStr===selectedDate;
    const hasData=p&&p.days&&p.days[dateStr]&&((p.days[dateStr].expenses||[]).length>0||(p.days[dateStr].diary||'').trim());
    let cls='cal-day';
    if(isToday)cls+=' today';
    if(isSel)cls+=' selected';
    if(hasData)cls+=' has-data';
    html+=`<div class="${cls}" onclick="selectDate('${dateStr}')">${d}</div>`;
  }
  grid.innerHTML=html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

function selectDate(dateStr){
  selectedDate=dateStr;
  renderCalendar();
  renderDayPanel();
  document.getElementById('day-panel').style.display='';
}

function renderDayPanel(){
  if(!selectedDate||!currentProject)return;
  const d=currentProject.days[selectedDate]||{expenses:[],diary:''};
  const dt=new Date(selectedDate+'T00:00:00');
  const dayNames=['일','월','화','수','목','금','토'];
  const label=`${dt.getMonth()+1}월 ${dt.getDate()}일 (${dayNames[dt.getDay()]})`;
  document.getElementById('day-label').textContent=label;

  const expEl=document.getElementById('day-expenses');
  const exps=d.expenses||[];

  if(!exps.length){
    expEl.innerHTML=`<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">지출 내역이 없습니다</div>`;
    return;
  }

  const totalKRW=exps.reduce((s,e)=>s+(e.amountKRW||0),0);
  const personal=exps.filter(e=>!e.isShared).reduce((s,e)=>s+(e.amountKRW||0),0);
  const shared=exps.filter(e=>e.isShared).reduce((s,e)=>s+(e.amountKRW||0),0);

  expEl.innerHTML=`
  <div class="card" style="margin-bottom:8px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
      <div style="font-size:13px;color:var(--text3);">총 지출</div>
      <div style="font-size:16px;font-weight:700;">${fmtKRW(totalKRW)}</div>
    </div>
    <div style="display:flex;gap:16px;">
      <div><div style="font-size:11px;color:var(--text3);">개인</div><div style="font-size:13px;font-weight:600;color:var(--blue);">${fmtKRW(personal)}</div></div>
      <div><div style="font-size:11px;color:var(--text3);">공통</div><div style="font-size:13px;font-weight:600;color:var(--amber);">${fmtKRW(shared)}</div></div>
    </div>
  </div>
  <div class="card">
    ${exps.map(e=>expenseItem(e)).join('')}
  </div>`;
}

function expenseItem(e){
  const cat=db.expenseCategories.find(c=>c.id===e.categoryId)||{icon:'💡',name:'기타'};
  const payType=e.payType==='card'?'💳':'💵';
  const sharedBadge=e.isShared?`<span class="badge badge-amber">공통</span>`:`<span class="badge badge-blue">개인</span>`;
  const localAmt=e.amountLocal&&e.currency&&e.currency!=='KRW'?`${fmtLocal(e.amountLocal)} ${e.currency}`:'';
  return`<div class="exp-item">
    <div class="exp-icon" style="background:var(--surface2);">${cat.icon}</div>
    <div class="exp-info">
      <div class="exp-title">${cat.name}${e.memo?` · <span style="color:var(--text3);font-size:12px;">${e.memo.slice(0,20)}</span>`:''}</div>
      <div class="exp-meta">${payType} ${e.payer||'나'} ${sharedBadge} ${e.exchangeRate?`<span style="font-size:10px;color:var(--text3);">@${fmtLocal(e.exchangeRate)}</span>`:''}</div>
    </div>
    <div class="exp-amount">
      <div class="exp-krw">${fmtKRW(e.amountKRW||0)}</div>
      ${localAmt?`<div class="exp-local">${localAmt}</div>`:''}
    </div>
    <button class="btn-icon" style="font-size:16px;" onclick="editExpItem('${e.id}')">…</button>
  </div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ADD / EDIT EXPENSE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function openAddExpense(expId){
  const p=currentProject;
  if(!selectedDate||!p)return;
  const isEdit=!!expId;
  let existing=null;
  if(isEdit){
    const day=p.days[selectedDate]||{};
    existing=(day.expenses||[]).find(e=>e.id===expId);
  }

  const cats=db.expenseCategories.filter(c=>c.group==='기본'||c.group===p.catGroup);
  const members=p.members||[];
  const currency=p.currency||'KRW';

  const defCat=existing?existing.categoryId:'food';
  const defAmt=existing&&existing.amountLocal?existing.amountLocal:'';
  const defMemo=existing?existing.memo||'':'';
  const defPay=existing?existing.payType||'card':'card';
  const defShared=existing?!!existing.isShared:members.length>0;
  const defPayer=existing?existing.payer||'나':'나';
  const defRate=existing?existing.exchangeRate||'':'';

  const payerOpts=['나',...members].filter((v,i,a)=>a.indexOf(v)===i);

  showSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">${isEdit?'지출 수정':'지출 추가'} · ${selectedDate}</div>
    <div class="form-group">
      <label class="form-label">지출 항목</label>
      <div class="chips" id="ae-cat-chips" style="max-height:120px;overflow-y:auto;">
        ${cats.map(c=>`<button class="chip${c.id===defCat?' active':''}" data-v="${c.id}" onclick="pickChip(this,'ae-cat-chips')">${c.icon} ${c.name}</button>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <div class="form-group" style="flex:1;">
        <label class="form-label">금액 (${currency})</label>
        <input class="form-input" id="ae-amount" type="number" placeholder="0" value="${defAmt}" inputmode="decimal" style="font-size:16px;"/>
      </div>
      ${currency!=='KRW'?`<div class="form-group" style="flex:1;">
        <label class="form-label">환율 (1${currency}→₩) <span id="ae-rate-loader" style="display:none;"><div class="spinner" style="display:inline-block;width:12px;height:12px;"></div></span></label>
        <input class="form-input" id="ae-rate" type="number" placeholder="자동조회" value="${defRate}" inputmode="decimal" style="font-size:16px;"/>
      </div>`:''}
    </div>
    ${currency!=='KRW'?`<div style="margin:-12px 0 12px;font-size:12px;color:var(--text3);" id="ae-krw-preview">원화 환산: 금액과 환율을 입력하세요</div>`:''}
    <div class="form-group">
      <label class="form-label">결제 수단</label>
      <div class="chips" id="ae-pay-chips">
        <button class="chip${defPay==='card'?' active':''}" data-v="card" onclick="pickChip(this,'ae-pay-chips')">💳 카드</button>
        <button class="chip${defPay==='cash'?' active':''}" data-v="cash" onclick="pickChip(this,'ae-pay-chips')">💵 현금</button>
      </div>
    </div>
    ${members.length?`<div class="form-group">
      <label class="form-label">결제자</label>
      <div class="chips" id="ae-payer-chips">
        ${payerOpts.map(m=>`<button class="chip${m===defPayer?' active':''}" data-v="${m}" onclick="pickChip(this,'ae-payer-chips')">${m}</button>`).join('')}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">지출 구분</label>
      <div class="chips" id="ae-shared-chips">
        <button class="chip${defShared?'':' active'}" data-v="personal" onclick="pickChip(this,'ae-shared-chips')">👤 개인</button>
        <button class="chip${defShared?' active':''}" data-v="shared" onclick="pickChip(this,'ae-shared-chips')">👥 공통 (${members.length+1}명)</button>
      </div>
    </div>`:''}
    <div class="form-group">
      <label class="form-label">메모</label>
      <input class="form-input" id="ae-memo" placeholder="간단 메모 (선택)" value="${defMemo}" autocomplete="off" autocorrect="off" autocapitalize="off" style="font-size:16px;"/>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      ${isEdit?`<button class="btn btn-danger" style="flex:0 0 auto;" onclick="deleteExpItem('${expId}')">삭제</button>`:''}
      <button class="btn btn-ghost" style="flex:1;" onclick="closeSheet()">취소</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveExpense('${expId||''}')">저장</button>
    </div>
  `);

  // Auto-fetch exchange rate
  if(currency!=='KRW'&&!defRate){
    fetchExchangeRate(currency,selectedDate);
  }
  // Live KRW preview
  ['ae-amount','ae-rate'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('input',updateKRWPreview);
  });
}

function updateKRWPreview(){
  const prev=document.getElementById('ae-krw-preview');
  if(!prev)return;
  const amt=parseFloat(document.getElementById('ae-amount')?.value)||0;
  const rate=parseFloat(document.getElementById('ae-rate')?.value)||0;
  if(amt&&rate){
    prev.textContent='원화 환산: '+fmtKRW(Math.round(amt*rate));
    prev.style.color='var(--green)';
  }else{
    prev.textContent='원화 환산: 금액과 환율을 입력하세요';
    prev.style.color='var(--text3)';
  }
}

async function fetchExchangeRate(currency,dateStr){
  const loader=document.getElementById('ae-rate-loader');
  if(loader)loader.style.display='';
  try{
    const url=`https://api.frankfurter.app/${dateStr}?from=${currency}&to=KRW`;
    const res=await fetch(url);
    const data=await res.json();
    const rate=data.rates&&data.rates.KRW;
    if(rate){
      const inp=document.getElementById('ae-rate');
      if(inp){inp.value=Math.round(rate);updateKRWPreview();}
    }
  }catch(e){
    // If date is future or unavailable, try latest
    try{
      const url2=`https://api.frankfurter.app/latest?from=${currency}&to=KRW`;
      const res2=await fetch(url2);
      const data2=await res2.json();
      const rate2=data2.rates&&data2.rates.KRW;
      if(rate2){
        const inp=document.getElementById('ae-rate');
        if(inp){inp.value=Math.round(rate2);updateKRWPreview();}
      }
    }catch{}
  }finally{
    if(loader)loader.style.display='none';
  }
}

function saveExpense(expId){
  const p=currentProject;
  if(!p||!selectedDate)return;
  const catId=getActiveChip('ae-cat-chips')||'misc';
  const amtLocal=parseFloat(document.getElementById('ae-amount').value)||0;
  const rateEl=document.getElementById('ae-rate');
  const rate=rateEl?parseFloat(rateEl.value)||1:1;
  const currency=p.currency||'KRW';
  const amtKRW=currency==='KRW'?amtLocal:Math.round(amtLocal*rate);
  const payType=getActiveChip('ae-pay-chips')||'card';
  const payer=getActiveChip('ae-payer-chips')||'나';
  const sharedVal=getActiveChip('ae-shared-chips');
  const isShared=sharedVal==='shared';
  const memo=document.getElementById('ae-memo').value.trim();

  if(!amtKRW)return alert('금액을 입력하세요.');

  if(!p.days[selectedDate])p.days[selectedDate]={expenses:[],diary:''};
  const day=p.days[selectedDate];

  if(expId){
    const idx=day.expenses.findIndex(e=>e.id===expId);
    if(idx>=0)day.expenses[idx]={...day.expenses[idx],categoryId:catId,amountLocal,amountKRW:amtKRW,currency,exchangeRate:rate,payType,payer,isShared,memo};
  }else{
    day.expenses.push({id:uid(),categoryId:catId,amountLocal,amountKRW:amtKRW,currency,exchangeRate:rate,payType,payer,isShared,memo,createdAt:Date.now()});
  }

  save();closeSheet();
  renderProjectSummary();renderCalendar();renderDayPanel();
}

function editExpItem(id){openAddExpense(id);}
function deleteExpItem(id){
  if(!confirm('삭제할까요?'))return;
  const day=currentProject.days[selectedDate];
  if(day)day.expenses=(day.expenses||[]).filter(e=>e.id!==id);
  save();closeSheet();renderProjectSummary();renderCalendar();renderDayPanel();
}

function openDiary(){
  const p=currentProject;
  if(!selectedDate||!p)return;
  const day=p.days[selectedDate]||{expenses:[],diary:'',photos:[]};
  const photos=day.photos||[];
  showSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">📖 ${selectedDate} 일기</div>
    <div class="form-group">
      <textarea class="form-input" id="diary-text" placeholder="오늘의 여행 이야기를 기록하세요…"
        style="min-height:150px;font-size:16px;" oninput="autoResize(this)">${day.diary||''}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">사진</label>
      <div class="photo-grid" id="diary-photos">
        ${photos.map((ph,i)=>`<div style="position:relative;">
          <img src="${ph.data}" class="photo-thumb" alt="photo"/>
          <button onclick="removePhoto(${i})" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:12px;">✕</button>
        </div>`).join('')}
        <div class="photo-add" onclick="document.getElementById('photo-input').click()">＋</div>
      </div>
      <input type="file" id="photo-input" accept="image/*" multiple style="display:none;" onchange="addPhotos(this)"/>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeSheet()">취소</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveDiary()">저장</button>
    </div>
  `);
}

function removePhoto(idx){
  const p=currentProject;
  if(!p||!selectedDate)return;
  const day=p.days[selectedDate]||{};
  if(day.photos)day.photos.splice(idx,1);
  save();
  openDiary();
}

function addPhotos(input){
  const p=currentProject;
  if(!p||!selectedDate)return;
  if(!p.days[selectedDate])p.days[selectedDate]={expenses:[],diary:'',photos:[]};
  const day=p.days[selectedDate];
  if(!day.photos)day.photos=[];
  const files=[...input.files];
  let done=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      day.photos.push({data:e.target.result,name:file.name,addedAt:Date.now()});
      done++;
      if(done===files.length){save();openDiary();}
    };
    reader.readAsDataURL(file);
  });
}

function saveDiary(){
  const p=currentProject;
  if(!p||!selectedDate)return;
  if(!p.days[selectedDate])p.days[selectedDate]={expenses:[],diary:'',photos:[]};
  p.days[selectedDate].diary=document.getElementById('diary-text').value;
  save();closeSheet();renderCalendar();
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SETTLEMENT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openSettle(){
  const p=currentProject;
  if(!p)return;

  const dates=Object.keys(p.days).sort();
  const minDate=dates[0]||today();
  const maxDate=dates[dates.length-1]||today();

  showSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">💰 정산</div>
    <div style="display:flex;gap:10px;margin-bottom:16px;">
      <div class="form-group" style="flex:1;margin-bottom:0;">
        <label class="form-label">시작일</label>
        <input class="form-input" id="settle-from" type="date" value="${minDate}" style="font-size:16px;"/>
      </div>
      <div class="form-group" style="flex:1;margin-bottom:0;">
        <label class="form-label">종료일</label>
        <input class="form-input" id="settle-to" type="date" value="${maxDate}" style="font-size:16px;"/>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-bottom:16px;" onclick="calcSettle()">정산 계산</button>
    <div id="settle-result"></div>
  `);
}

function calcSettle(){
  const p=currentProject;
  const from=document.getElementById('settle-from').value;
  const to=document.getElementById('settle-to').value;

  const members=['나',...(p.members||[])];
  const n=members.length||1;

  // Collect all expenses in range
  let allExps=[];
  Object.entries(p.days||{}).forEach(([date,day])=>{
    if(date>=from&&date<=to){
      (day.expenses||[]).forEach(e=>allExps.push({...e,date}));
    }
  });

  // Personal by payer
  const personal={};members.forEach(m=>personal[m]=0);
  allExps.filter(e=>!e.isShared).forEach(e=>{
    const payer=e.payer||'나';
    if(personal[payer]!==undefined)personal[payer]+=(e.amountKRW||0);
  });

  // Shared total → each person owes 1/n
  const sharedTotal=allExps.filter(e=>e.isShared).reduce((s,e)=>s+(e.amountKRW||0),0);
  const sharedPerPerson=Math.round(sharedTotal/n);

  // What each person paid in shared
  const sharedPaid={};members.forEach(m=>sharedPaid[m]=0);
  allExps.filter(e=>e.isShared).forEach(e=>{
    const payer=e.payer||'나';
    if(sharedPaid[payer]!==undefined)sharedPaid[payer]+=(e.amountKRW||0);
  });

  // Balance: how much each person is owed (positive) or owes (negative)
  // balance = what they paid in shared - what they owe (sharedPerPerson)
  const balance={};
  members.forEach(m=>{balance[m]=(sharedPaid[m]||0)-sharedPerPerson;});

  const grandTotal=allExps.reduce((s,e)=>s+(e.amountKRW||0),0);

  // Day-by-day breakdown
  const dayRows=Object.entries(p.days||{})
    .filter(([d])=>d>=from&&d<=to)
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([date,day])=>{
      const dt=new Date(date+'T00:00:00');
      const dayNames=['일','월','화','수','목','금','토'];
      const dl=`${dt.getMonth()+1}/${dt.getDate()}(${dayNames[dt.getDay()]})`;
      const total=(day.expenses||[]).reduce((s,e)=>s+(e.amountKRW||0),0);
      return`<div class="sum-row">
        <span class="label">${dl}</span>
        <span class="value">${fmtKRW(total)}</span>
      </div>`;
    }).join('');

  const el=document.getElementById('settle-result');
  el.innerHTML=`
  <div class="card" style="margin-bottom:10px;">
    <div class="sum-row" style="margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:8px;">
      <span style="font-weight:700;color:var(--text);">총 지출</span>
      <span style="font-size:18px;font-weight:700;color:var(--text);">${fmtKRW(grandTotal)}</span>
    </div>
    <div class="sum-row"><span class="label">개인 지출</span><span class="value">${fmtKRW(grandTotal-sharedTotal)}</span></div>
    <div class="sum-row"><span class="label">공통 지출</span><span class="value">${fmtKRW(sharedTotal)}</span></div>
    ${n>1?`<div class="sum-row"><span class="label">1인당 공통 부담</span><span class="value" style="color:var(--amber);">${fmtKRW(sharedPerPerson)}</span></div>`:''}
  </div>
  ${n>1?`<div class="card" style="margin-bottom:10px;">
    <div style="font-size:13px;font-weight:700;color:var(--text3);margin-bottom:10px;">정산 내역</div>
    ${members.map(m=>{
      const b=balance[m];
      const cls=b>=0?'badge-green':'badge-red';
      const label=b>=0?`+${fmtKRW(b)} 받을 돈`:`${fmtKRW(Math.abs(b))} 낼 돈`;
      return`<div class="sum-row">
        <span class="label">${m}</span>
        <span class="badge ${cls}">${label}</span>
      </div>`;
    }).join('')}
  </div>`:''}
  ${dayRows?`<div class="card">
    <div style="font-size:13px;font-weight:700;color:var(--text3);margin-bottom:10px;">일별 지출</div>
    ${dayRows}
  </div>`:''}
  <button class="btn btn-ghost" style="width:100%;margin-top:10px;" onclick="shareSettle()">📤 카톡으로 공유</button>`;
}

function shareSettle(){
  const from=document.getElementById('settle-from')?.value;
  const to=document.getElementById('settle-to')?.value;
  const p=currentProject;
  if(!p)return;
  const lines=[`✈️ ${p.name} 여행 정산`,`기간: ${from} ~ ${to}`,''];
  const members=['나',...(p.members||[])];
  const n=members.length||1;
  let allExps=[];
  Object.entries(p.days||{}).forEach(([date,day])=>{
    if(date>=from&&date<=to)(day.expenses||[]).forEach(e=>allExps.push({...e,date}));
  });
  const sharedTotal=allExps.filter(e=>e.isShared).reduce((s,e)=>s+(e.amountKRW||0),0);
  const grandTotal=allExps.reduce((s,e)=>s+(e.amountKRW||0),0);
  lines.push(`총 지출: ${fmtKRW(grandTotal)}`);
  lines.push(`공통 지출: ${fmtKRW(sharedTotal)}`);
  if(n>1)lines.push(`1인당 공통 부담: ${fmtKRW(Math.round(sharedTotal/n))}`);
  lines.push('');
  lines.push('- Buen Camino 여행 다이어리');
  const txt=lines.join('\n');
  if(navigator.share){navigator.share({title:'',text:txt});}
  else{navigator.clipboard?.writeText(txt);alert('클립보드에 복사됐어요!');}
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderStats(){
  const el=document.getElementById('stats-content');
  if(!db.projects.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">여행 기록이 없습니다</div></div>`;
    return;
  }

  const allExps=[];
  db.projects.forEach(p=>{
    Object.values(p.days||{}).forEach(d=>{
      (d.expenses||[]).forEach(e=>allExps.push({...e,projectName:p.name,flag:p.flag}));
    });
  });

  const totalKRW=allExps.reduce((s,e)=>s+(e.amountKRW||0),0);

  // By category
  const byCat={};
  allExps.forEach(e=>{
    const cat=db.expenseCategories.find(c=>c.id===e.categoryId)||{name:'기타',icon:'💡'};
    if(!byCat[cat.name])byCat[cat.name]={icon:cat.icon,total:0};
    byCat[cat.name].total+=(e.amountKRW||0);
  });
  const catSorted=Object.entries(byCat).sort((a,b)=>b[1].total-a[1].total).slice(0,6);

  // By project
  const projRows=db.projects.map(p=>{
    const total=projectTotalKRW(p);
    const pct=totalKRW?Math.round(total/totalKRW*100):0;
    return{name:p.name,flag:p.flag,total,pct};
  }).sort((a,b)=>b.total-a.total);

  el.innerHTML=`
  <div class="card" style="margin-bottom:12px;">
    <div style="font-size:13px;color:var(--text3);margin-bottom:4px;">전체 여행 지출 합계</div>
    <div style="font-size:28px;font-weight:700;">${fmtKRW(totalKRW)}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:4px;">총 ${db.projects.length}개 프로젝트</div>
  </div>

  <div class="section-header"><span class="section-title">카테고리별 지출</span></div>
  <div class="card" style="margin-bottom:12px;">
    ${catSorted.map(([name,info])=>{
      const pct=totalKRW?Math.round(info.total/totalKRW*100):0;
      return`<div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:13px;">${info.icon} ${name}</span>
          <span style="font-size:13px;font-weight:600;">${fmtKRW(info.total)} <span style="color:var(--text3);font-size:11px;">${pct}%</span></span>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${pct}%;background:var(--accent);"></div></div>
      </div>`;
    }).join('')}
  </div>

  <div class="section-header"><span class="section-title">여행별 지출</span></div>
  <div class="card">
    ${projRows.map(r=>`<div class="sum-row">
      <span class="label">${r.flag} ${r.name}</span>
      <div style="text-align:right;">
        <div style="font-size:14px;font-weight:600;">${fmtKRW(r.total)}</div>
        <div style="font-size:11px;color:var(--text3);">${r.pct}%</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function renderSettings(){
  const el=document.getElementById('settings-content');
  const cats=db.expenseCategories;
  const groups=[...new Set(cats.map(c=>c.group))];

  el.innerHTML=`
  <div class="section-header"><span class="section-title">자주 쓰는 친구</span></div>
  <div class="card" style="margin-bottom:12px;">
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;" id="friend-list">

        ${f}<button onclick="deleteFriend('${f}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:0;">✕</button>
      </span>`).join('')}
    </div>
    <div style="display:flex;gap:8px;">
      <input class="form-input" id="new-friend" placeholder="친구 이름" style="flex:1;font-size:16px;" autocomplete="off"/>
      <button class="btn btn-ghost" onclick="addFriend()">추가</button>

  </div>

    <button class="btn btn-ghost" style="font-size:12px;padding:4px 10px;" onclick="openAddCategory()">＋ 추가</button>
  </div>

    <div style="font-size:12px;color:var(--accent2);margin-bottom:8px;font-weight:700;">${g}</div>

  <div class="section-header"><span class="section-title">데이터 관리</span></div>
  <div class="card">
    <div class="sum-row">
      <span class="label">데이터 내보내기</span>
      <button class="btn btn-ghost" style="font-size:12px;padding:4px 10px;" onclick="exportData()">JSON 내보내기</button>
    </div>
    <div class="sum-row">
      <span class="label" style="color:var(--red);">전체 초기화</span>
      <button class="btn btn-danger" style="font-size:12px;padding:4px 10px;" onclick="resetAll()">초기화</button>
    </div>
  </div>`;
}

function addFriend(){
  const inp=document.getElementById('new-friend');
  const name=inp.value.trim();
  if(!name||db.friends.includes(name))return;
  db.friends.push(name);
  inp.value='';
  save();renderSettings();
}
function deleteFriend(name){
  db.friends=db.friends.filter(f=>f!==name);
  save();renderSettings();
}
function deleteCat(id){
  if(!confirm('삭제할까요?'))return;
  db.expenseCategories=db.expenseCategories.filter(c=>c.id!==id);
  save();renderSettings();
}
function openAddCategory(){
  showSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">지출 항목 추가</div>

      <label class="form-label">이모지 아이콘</label>

function saveCat(){
  const icon=document.getElementById('nc-icon').value.trim()||'💡';
  const name=document.getElementById('nc-name').value.trim();
  const group=document.getElementById('nc-group').value;
  if(!name)return alert('항목 이름을 입력하세요.');
  db.expenseCategories.push({id:uid(),name,icon,group});
  save();closeSheet();renderSettings();
}

function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`buencamino_${today()}.json`;a.click();
  URL.revokeObjectURL(url);
}
function resetAll(){
  if(!confirm('모든 데이터를 삭제할까요? 이 작업은 되돌릴 수 없습니다.'))return;
  db=defaultDB();save();renderSettings();renderHome();
}

function pickChip(btn,groupId){
  document.querySelectorAll('#'+groupId+' .chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
}
function toggleChipMulti(btn){
  btn.classList.toggle('active');
}
function getActiveChip(groupId){
  const el=document.querySelector('#'+groupId+' .chip.active');
  return el?el.dataset.v:null;
}
function getActiveChipsMulti(groupId){
  return[...document.querySelectorAll('#'+groupId+' .chip.active')].map(c=>c.dataset.v);
}

// FORMAT HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function fmtKRW(n){return'₩'+Math.round(n).toLocaleString();}
function fmtLocal(n){
  if(!n)return'';
  const rounded=Math.round(n*100)/100;
  return rounded.toLocaleString();
}
function today(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
