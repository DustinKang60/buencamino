<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" id="theme-color-meta" content="#080c18"/>
<link rel="manifest" href="manifest.json"/>
<title>Buen Camino</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

/* ── DARK THEME (default) ── */
:root{
  --bg:#080c18;--surface:#0f1528;--surface2:#161d35;--surface3:#1e2744;
  --border:#1e2744;--border2:#2a3560;--border3:#374880;
  --text:#f0f4ff;--text2:#8892b0;--text3:#4a5578;
  --accent:#4f8cff;--accent2:#7eb3ff;--accent-bg:#0a1a3a;--accent-border:#1e3a6a;
  --green:#00d68f;--green-bg:#002a1c;--green-border:#004d34;
  --red:#ff5c7a;--red-bg:#2a0010;--red-border:#4a0020;
  --amber:#ffb740;--amber-bg:#2a1800;--amber-border:#4a3000;
  --purple:#a78bfa;--purple-bg:#1a0f3a;--purple-border:#3a2560;
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --radius:14px;--radius-sm:10px;--radius-lg:22px;
  --ff:'Noto Sans KR',sans-serif;
}

/* ── LIGHT THEME ── */
body.light{
  --bg:#f4f6fb;--surface:#ffffff;--surface2:#f0f3fa;--surface3:#e4e9f5;
  --border:#dde3f0;--border2:#c8d0e8;--border3:#a0aece;
  --text:#1a1f35;--text2:#4a5478;--text3:#8892b0;
  --accent:#2563eb;--accent2:#1d4ed8;--accent-bg:#eff6ff;--accent-border:#bfdbfe;
  --green:#059669;--green-bg:#ecfdf5;--green-border:#a7f3d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fecaca;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fde68a;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-border:#ddd6fe;
  --shadow:0 4px 16px rgba(0,0,0,.12);
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ff);transition:background .2s,color .2s;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);
  height:54px;display:flex;align-items:center;justify-content:space-between;
  padding:0 6px;flex-shrink:0;
  padding-top:env(safe-area-inset-top);}
.tb-title{font-size:16px;font-weight:700;color:var(--text);}
.tb-group{display:flex;align-items:center;gap:2px;min-width:72px;}
.tb-group.right{justify-content:flex-end;}
.back-btn{display:flex;align-items:center;color:var(--accent);background:none;border:none;
  cursor:pointer;font-family:var(--ff);font-size:14px;font-weight:600;padding:8px 6px;border-radius:8px;}
.back-btn:active{opacity:.6;}
.ibtn{background:none;border:none;color:var(--text2);cursor:pointer;
  width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:17px;transition:all .12s;flex-shrink:0;}
.ibtn:active{background:var(--surface3);}
.ibtn.accent{color:var(--accent);font-size:22px;}

/* ── BOTTOM NAV ── */
.nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom);}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 0;border:none;background:none;color:var(--text3);
  font-family:var(--ff);font-size:10px;cursor:pointer;position:relative;}
.nbtn.on{color:var(--accent);}
.nbtn.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:28px;height:2px;border-radius:0 0 2px 2px;background:var(--accent);}
.nicon{font-size:16px;line-height:1;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100%;}
.screen.on{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.card-tap{cursor:pointer;transition:transform .12s,opacity .12s;}
.card-tap:active{transform:scale(.98);opacity:.8;}

/* ── BUTTONS ── */
.btn{border:none;border-radius:var(--radius-sm);padding:11px 18px;cursor:pointer;
  font-family:var(--ff);font-size:14px;font-weight:600;transition:all .12s;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 3px 14px rgba(79,140,255,.3);}
.btn-p:active{filter:brightness(.88);}
.btn-g{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.btn-g:active{background:var(--surface3);}
.btn-d{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.btn-d:active{opacity:.8;}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}
.btn-full{width:100%;}

/* ── FORM ── */
.flabel{font-size:10px;color:var(--text3);margin-bottom:5px;display:block;
  font-weight:700;text-transform:uppercase;letter-spacing:.7px;}
.finput{width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:11px 12px;color:var(--text);
  font-family:var(--ff);font-size:16px;outline:none;transition:border-color .15s;}
.finput:focus{border-color:var(--accent);background:var(--accent-bg);}
.finput::placeholder{color:var(--text3);}
textarea.finput{resize:none;min-height:90px;line-height:1.6;}
select.finput{appearance:none;cursor:pointer;}
.fgroup{margin-bottom:16px;}
.frow{display:flex;gap:10px;}
.frow .fgroup{flex:1;}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:7px 13px;border-radius:18px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;
  transition:all .12s;font-family:var(--ff);font-weight:500;}
.chip.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2);}
body.light .chip.on{color:var(--accent);}
.chip:active{transform:scale(.95);}

/* ── SHEET ── */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding:8px 18px calc(24px + env(safe-area-inset-bottom));
  width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow);}
.s-handle{width:38px;height:4px;background:var(--border3);border-radius:2px;margin:8px auto 18px;}
.s-title{font-size:17px;font-weight:700;margin-bottom:18px;color:var(--text);}
.s-actions{display:flex;gap:8px;margin-top:18px;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.badge-b{background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent-border);}
.badge-a{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.badge-g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.badge-r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.badge-p{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);}
body.light .badge-b{color:var(--accent);}
body.light .badge-g{color:var(--green);}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month{font-size:15px;font-weight:700;color:var(--text);}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.chdr{text-align:center;font-size:10px;color:var(--text3);padding:3px 0;font-weight:600;}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:8px;font-size:12px;cursor:pointer;position:relative;color:var(--text2);transition:all .1s;}
.cell:active{transform:scale(.88);}
.cell.today{color:var(--accent);font-weight:700;}
.cell.sel{background:var(--accent);color:#fff;font-weight:700;}
.cell.other{color:var(--text3);}
.cell.has-e::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--accent);}
.cell.has-d::before{content:'';position:absolute;top:2px;right:3px;
  width:4px;height:4px;border-radius:50%;background:var(--purple);}
.cell.sel::after,.cell.sel::before{background:rgba(255,255,255,.7);}

/* ── LIST ITEMS ── */
.li{display:flex;align-items:center;gap:9px;padding:10px 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  margin-bottom:5px;cursor:pointer;transition:all .12s;}
.li:active{transform:scale(.98);opacity:.8;}
.li-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;}
.li-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.li-ico.exp{background:var(--accent-bg);}
.li-ico.diary{background:var(--purple-bg);}
.li-body{flex:1;min-width:0;}
.li-title{font-size:13px;font-weight:600;color:var(--text);}
.li-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.li-r{text-align:right;flex-shrink:0;}
.li-amt{font-size:13px;font-weight:700;color:var(--text);}
.li-arr{font-size:14px;color:var(--text3);flex-shrink:0;}

/* ── SUMMARY CARDS ── */
.sum-card{display:flex;justify-content:space-between;align-items:center;}
.sum-mini{text-align:center;border-radius:10px;padding:7px 12px;}

/* ── ROWS ── */
.row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.rl{font-size:12px;color:var(--text2);}
.rr{font-size:13px;font-weight:600;color:var(--text);}

/* ── PROGRESS ── */
.prog{height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);}

/* ── DIVIDER ── */
.div{height:1px;background:var(--border);margin:10px 0;}

/* ── SECTION HDR ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 8px;}
.sec-t{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}

/* ── SETTINGS ── */
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);}
.srow:last-child{border-bottom:none;}
.stitle{font-size:14px;color:var(--text);}
.ssub{font-size:11px;color:var(--text3);margin-top:2px;}
.toggle{width:44px;height:26px;border-radius:13px;position:relative;cursor:pointer;
  border:none;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--accent);}
.toggle.off{background:var(--border2);}
.toggle-knob{width:20px;height:20px;background:#fff;border-radius:50%;
  position:absolute;top:3px;transition:left .2s;}
.toggle.on .toggle-knob{left:21px;}
.toggle.off .toggle-knob{left:3px;}

/* ── KRW PREVIEW ── */
.krw-prev{font-size:12px;color:var(--green);padding:8px 11px;background:var(--green-bg);
  border-radius:8px;border:1px solid var(--green-border);margin-bottom:12px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:52px 20px;color:var(--text3);}
.empty-ico{font-size:48px;margin-bottom:14px;opacity:.6;}
.empty-t{font-size:15px;color:var(--text2);margin-bottom:6px;font-weight:600;}
.empty-s{font-size:12px;}

/* ── DETAIL ── */
.detail-photo{width:100%;border-radius:var(--radius);max-height:240px;object-fit:cover;margin-bottom:14px;}
.detail-text{font-size:15px;line-height:1.85;color:var(--text);white-space:pre-wrap;}

/* ── SPINNER ── */
.spin{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── COUNTRY LIST ── */
.clist{position:absolute;top:100%;left:0;right:0;background:var(--surface2);
  border:1px solid var(--border2);border-radius:var(--radius-sm);z-index:10;
  max-height:180px;overflow-y:auto;box-shadow:var(--shadow);}
.citem{padding:10px 13px;font-size:13px;cursor:pointer;transition:background .1s;color:var(--text);}
.citem:active,.citem:hover{background:var(--surface3);}

/* ── ANIM ── */
.fade-up{animation:fu .2s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── CALCULATOR ── */
.calc-wrap{background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.calc-display{background:var(--surface3);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;text-align:right;}
.calc-expr{font-size:12px;color:var(--text3);min-height:16px;word-break:break-all;}
.calc-result{font-size:26px;font-weight:700;color:var(--text);margin-top:2px;}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.cbtn{background:var(--surface3);border:none;border-radius:8px;padding:14px 0;
  font-size:17px;font-weight:600;color:var(--text);cursor:pointer;font-family:var(--ff);transition:all .1s;}
.cbtn:active{transform:scale(.93);background:var(--border2);}
.cbtn.op{background:var(--accent-bg);color:var(--accent2);}
.cbtn.eq{background:var(--accent);color:#fff;}
.cbtn.clr{background:var(--red-bg);color:var(--red);}
.cbtn.wide{grid-column:span 2;}

/* ── SETTLE SCREEN ── */
.settle-day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  margin-bottom:8px;overflow:hidden;}
.settle-day-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:9px 12px;background:var(--surface2);border-bottom:1px solid var(--border);}
.settle-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;
  border-bottom:0.5px solid var(--border);}
.settle-row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div id="app">

<!-- ════════════════ HOME ════════════════ -->
<div class="screen on" id="sc-home">
  <div class="topbar">
    <div class="tb-group">
      <span style="font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">✈ Buen Camino</span>
    </div>
    <div class="tb-group right">
      <button class="ibtn" onclick="toggleSearch()">🔍</button>
      <button class="ibtn" onclick="nav('settings')">⚙️</button>
      <button class="ibtn accent" onclick="openNewProject()">＋</button>
    </div>
  </div>
  <div class="scroll" style="padding:14px;" id="home-body">
    <div id="home-search" style="display:none;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 13px;">
        <span style="font-size:14px;">🔍</span>
        <input id="home-q" placeholder="여행 이름 검색…" style="flex:1;background:none;border:none;color:var(--text);font-family:var(--ff);font-size:15px;outline:none;" oninput="renderHome()" autocomplete="off"/>
      </div>
    </div>
    <div id="proj-list"></div>
    <div id="home-empty" class="empty" style="display:none;">
      <div class="empty-ico">🗺️</div>
      <div class="empty-t">첫 여행을 시작해볼까요?</div>
      <div class="empty-s">＋ 버튼으로 새 프로젝트를 만드세요</div>
    </div>
  </div>
<nav class="nav"><button class="nbtn on" onclick="nav('home')"><span class="nicon">🏠</span>홈</button><button class="nbtn" onclick="nav('settle')"><span class="nicon">💰</span>정산</button><button class="nbtn" onclick="openCalc()"><span class="nicon">🧮</span>계산기</button><button class="nbtn" onclick="nav('stats')"><span class="nicon">📊</span>통계</button><button class="nbtn" onclick="nav('settings')"><span class="nicon">⚙️</span>설정</button></nav>
</div>

<!-- ════════════════ PROJECT ════════════════ -->
<div class="screen" id="sc-proj">
  <div class="topbar">
    <div class="tb-group">
      <button class="back-btn" onclick="nav('home')">‹ 뒤로</button>
    </div>
    <span class="tb-title" id="proj-tb-title" style="flex:1;text-align:center;"></span>
    <div class="tb-group right">
      <button class="ibtn" onclick="toggleSearch('proj')">🔍</button>
      <button class="ibtn" onclick="openSettle()" style="font-size:16px;">💰</button>
    </div>
  </div>
  <div class="scroll" style="padding:14px;" id="proj-body">
    <div id="proj-search" style="display:none;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 13px;">
        <span style="font-size:14px;">🔍</span>
        <input id="proj-q" placeholder="지출·일기 검색…" style="flex:1;background:none;border:none;color:var(--text);font-family:var(--ff);font-size:15px;outline:none;" oninput="filterMonthList()" autocomplete="off"/>
      </div>
    </div>
    <div id="proj-summary"></div>
    <div class="card" style="padding:13px 11px;">
      <div class="cal-nav">
        <button class="ibtn" onclick="calPrev()">‹</button>
        <span class="cal-month" id="cal-month"></span>
        <button class="ibtn" onclick="calNext()">›</button>
      </div>
      <div class="cal-g" id="cal-hdr"></div>
      <div class="cal-g" id="cal-grid" style="margin-top:3px;"></div>
      <div style="display:flex;gap:14px;margin-top:10px;padding-top:9px;border-top:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);">
          <div style="width:5px;height:5px;border-radius:50%;background:var(--accent);"></div>지출
        </div>
        <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);">
          <div style="width:5px;height:5px;border-radius:50%;background:var(--purple);"></div>일기
        </div>
      </div>
    </div>
    <div id="day-panel" style="display:none;" class="fade-up">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0 10px;">
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--text);" id="day-title"></div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;" id="day-sub"></div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-g btn-sm" onclick="openDiary()">📖 일기</button>
          <button class="btn btn-p btn-sm" onclick="openAddExp()">＋ 지출</button>
        </div>
      </div>
      <div id="day-list"></div>
    </div>
    <div id="month-list"></div>
  </div>
  <nav class="nav">
    <button class="nbtn" onclick="nav('home')"><span class="nicon">🏠</span>홈</button>
    <button class="nbtn" onclick="nav('settle')"><span class="nicon">💰</span>정산</button>
    <button class="nbtn" onclick="openCalc()"><span class="nicon">🧮</span>계산기</button>
    <button class="nbtn" onclick="nav('stats')"><span class="nicon">📊</span>통계</button>
    <button class="nbtn" onclick="nav('settings')"><span class="nicon">⚙️</span>설정</button>
  </nav>
</div>

<!-- ════════════════ DETAIL ════════════════ -->
<div class="screen" id="sc-detail">
  <div class="topbar">
    <div class="tb-group">
      <button class="back-btn" onclick="closeDetail()">‹ 뒤로</button>
    </div>
    <span class="tb-title" id="detail-title" style="flex:1;text-align:center;"></span>
    <div class="tb-group right"></div>
  </div>
  <div class="scroll" style="padding:18px 14px 16px;" id="detail-body"></div>
  <div style="padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;" id="detail-actions"></div>
</div>

<!-- ════════════════ STATS ════════════════ -->

let db;
function loadDB(){
  try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):mkDB();}catch{return mkDB();}
}

function save(){localStorage.setItem(KEY,JSON.stringify(db));}

// ══════════════════════════════════
// THEME
// ══════════════════════════════════
function applyTheme(){
  document.body.classList.toggle('light',!db.darkMode);
  document.getElementById('theme-color-meta').content=db.darkMode?'#080c18':'#ffffff';
}
applyTheme();

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let curProj=null, calY=new Date().getFullYear(), calM=new Date().getMonth();
let selDate=null, detailBackFn=null;

// ══════════════════════════════════
// NAVIGATION
// ══════════════════════════════════
// ── History stack for Android back button ──
let _histStack=[];
function _showScreen(sc){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('sc-'+sc).classList.add('on');
}
function _pushHistory(sc){
  history.pushState({sc}, '', location.href.split('#')[0]+'#'+sc);
  _histStack.push(sc);
}
window.addEventListener('popstate', function(e){
  // Android back pressed
  const sc=e.state&&e.state.sc;
  if(!sc||sc==='home'){
    _histStack=[];
    _showScreen('home');renderHome();
  } else if(sc==='proj'){
    _showScreen('proj');
  } else if(sc==='detail'){
    // going back from detail → proj
    _showScreen('proj');
    if(detailBackFn)detailBackFn();
  } else if(sc==='cats'){
    _showScreen('settings');renderSettings();
  } else {
    _showScreen(sc);
    if(sc==='stats')renderStats();
    if(sc==='settings')renderSettings();
  }
});

function nav(sc){
  _showScreen(sc);
  _pushHistory(sc);
  if(sc==='home')renderHome();
  if(sc==='stats')renderStats();
  if(sc==='settings')renderSettings();
  if(sc==='cats')renderCats();
  if(sc==='settle')renderSettle();
}
function openProj(id){
  curProj=db.projects.find(p=>p.id===id);
  if(!curProj)return;
  selDate=null;
  const sd=curProj.startDate?new Date(curProj.startDate):new Date();
  calY=sd.getFullYear();calM=sd.getMonth();
  _showScreen('proj');
  _pushHistory('proj');
  document.getElementById('proj-tb-title').textContent=(curProj.flag||'🌍')+' '+curProj.name;
  renderProjSummary();renderCal();renderMonthList();
  document.getElementById('day-panel').style.display='none';
  document.getElementById('month-list').style.display='';
}
function showDetail(title,bodyHTML,actHTML,backFn){
  document.getElementById('detail-title').textContent=title;
  document.getElementById('detail-body').innerHTML=bodyHTML;
  document.getElementById('detail-actions').innerHTML=actHTML;
  detailBackFn=backFn;
  _showScreen('detail');
  _pushHistory('detail');
}
function closeDetail(){
  _showScreen('proj');
  if(detailBackFn)detailBackFn();
  if(history.state&&history.state.sc==='detail')history.back();
}

let homeSearchOn=false;
function toggleSearch(ctx){
  if(!ctx){
    homeSearchOn=!homeSearchOn;
    const el=document.getElementById('home-search');
    el.style.display=homeSearchOn?'':'none';
    if(homeSearchOn)document.getElementById('home-q').focus();
  } else {
    const el=document.getElementById('proj-search');
    const on=el.style.display==='none'||!el.style.display;
    el.style.display=on?'':'none';
    if(on)document.getElementById('proj-q').focus();
  }
}

// ══════════════════════════════════
// HOME
// ══════════════════════════════════
function renderHome(){
  const q=(document.getElementById('home-q')||{}).value||'';
  let projs=db.projects.filter(p=>!q||p.name.includes(q)||(p.country||'').includes(q));
  const list=document.getElementById('proj-list');
  const empty=document.getElementById('home-empty');
  if(!projs.length){list.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  const typeMap={solo:['나홀로','badge-p'],group:['동반자','badge-b'],package:['패키지','badge-a']};
  list.innerHTML=projs.map(p=>{
    const total=projTotal(p);
    const days=Object.keys(p.days||{}).length;
    const [tl,tb]=typeMap[p.type]||['기타','badge-b'];
    const members=(p.members||[]).slice(0,3).join(', ')+(p.members&&p.members.length>3?` 외 ${p.members.length-3}명`:'');
    return`<div class="card fade-up proj-card" id="pc-${p.id}"
      onclick="projCardTap(event,'${p.id}')"
      oncontextmenu="return false;"
      ontouchstart="lpStart('${p.id}')" ontouchend="lpEnd()" ontouchmove="lpEnd()"
      onmousedown="lpStart('${p.id}')" onmouseup="lpEnd()" onmouseleave="lpEnd()"
      style="cursor:pointer;transition:transform .12s,opacity .12s;position:relative;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${members?'10px':'0'};">
        <div style="flex:1;min-width:0;">
          <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:5px;">${p.flag||'🌍'} ${p.name}</div>
          <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;">
            <span class="badge ${tb}">${tl}</span>
            ${p.country?`<span style="font-size:11px;color:var(--text3);">📍${p.country}</span>`:''}
            ${p.currency&&p.currency!=='KRW'?`<span style="font-size:11px;color:var(--text3);">${p.currency}</span>`:''}
            ${p.startDate?`<span style="font-size:11px;color:var(--text3);">📅 ${p.startDate}${p.endDate?' ~ '+p.endDate:''}</span>`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px;">
          <div style="font-size:17px;font-weight:700;color:var(--text);">${fmtW(total)}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;">${days}일 기록</div>
        </div>
      </div>
      ${members?`<div style="padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);">👥 ${members}</div>`:''}
      <!-- delete bar (hidden by default) -->
      <div class="proj-del-bar" id="delbar-${p.id}" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--red-border);">
        <button onclick="deleteProj(event,'${p.id}')"
          style="width:100%;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);
          border-radius:8px;padding:10px;font-size:13px;font-weight:600;font-family:var(--ff);cursor:pointer;">
          🗑 이 여행 삭제
        </button>
        <div style="text-align:center;font-size:11px;color:var(--text3);margin-top:6px;">취소하려면 다른 곳을 누르세요</div>
      </div>
    </div>`;
  }).join('');
}

function projTotal(p){
  return Object.values(p.days||{}).reduce((s,d)=>(d.expenses||[]).reduce((a,e)=>a+(e.amtKRW||0),s),0);
}

// ── Long-press delete ──
let _lpTimer=null, _lpId=null, _lpFired=false;
function lpStart(id){
  _lpFired=false; _lpId=id;
  _lpTimer=setTimeout(()=>{
    _lpFired=true;
    // hide all other del bars first
    document.querySelectorAll('.proj-del-bar').forEach(b=>b.style.display='none');
    document.querySelectorAll('.proj-card').forEach(c=>{c.style.transform='';c.style.opacity='';});
    const bar=document.getElementById('delbar-'+id);
    const card=document.getElementById('pc-'+id);
    if(bar){bar.style.display='';} 
    if(card){card.style.opacity='.9';}
    // tap outside to dismiss
    setTimeout(()=>document.addEventListener('touchstart',dismissDelBar,{once:true}),100);
    setTimeout(()=>document.addEventListener('mousedown',dismissDelBar,{once:true}),100);
  },600);
}
function lpEnd(){clearTimeout(_lpTimer);}
function projCardTap(e,id){
  if(_lpFired){_lpFired=false;return;}// swallow tap after long-press
  openProj(id);
}
function dismissDelBar(e){
  // if tapped inside a del bar, let the button handle it
  if(e.target.closest&&e.target.closest('.proj-del-bar'))return;
  document.querySelectorAll('.proj-del-bar').forEach(b=>b.style.display='none');
  document.querySelectorAll('.proj-card').forEach(c=>{c.style.opacity='';});
}
function deleteProj(e,id){
  e.stopPropagation();
  if(!confirm('이 여행 프로젝트를 삭제할까요?\n모든 지출·일기 기록이 함께 삭제됩니다.'))return;
  db.projects=db.projects.filter(p=>p.id!==id);
  save();renderHome();
}

function filterCountries(){
  const q=document.getElementById('np-country').value.trim();
  renderCList(q);document.getElementById('np-clist').style.display='';
}
function showCList(){renderCList(document.getElementById('np-country').value||'');}
function renderCList(q){
  const el=document.getElementById('np-clist');if(!el)return;
  const list=q?COUNTRIES.filter(c=>c.n.includes(q)):COUNTRIES;
  el.style.display=list.length?'':'none';
  el.innerHTML=list.map(c=>`<div class="citem" onmousedown="selCountry('${c.n}','${c.c}','${c.f}')">${c.f} ${c.n} <span style="color:var(--text3);font-size:11px;">${c.c}</span></div>`).join('');
}
function hideCList(){setTimeout(()=>{const el=document.getElementById('np-clist');if(el)el.style.display='none';},180);}
function selCountry(n,c,f){
  const inp=document.getElementById('np-country');
  inp.value=n;inp.dataset.flag=f;
  document.getElementById('np-cur').value=c;
  document.getElementById('np-clist').style.display='none';
}
function syncFriends(){
  const active=[...document.querySelectorAll('#np-fchips .chip.on')].map(c=>c.dataset.v);
  active.forEach(n=>{if(!npMembers.includes(n))npMembers.push(n);});
  [...document.querySelectorAll('#np-fchips .chip')].filter(c=>!c.classList.contains('on'))
    .forEach(c=>{npMembers=npMembers.filter(m=>m!==c.dataset.v);});
  renderNpMem();
}
function addNpMem(){
  const inp=document.getElementById('np-mem');
  const name=inp.value.trim();
  if(!name||npMembers.includes(name))return;
  npMembers.push(name);inp.value='';renderNpMem();
}
function rmNpMem(n){npMembers=npMembers.filter(m=>m!==n);renderNpMem();}
function renderNpMem(){
  const el=document.getElementById('np-mem-list');if(!el)return;
  el.innerHTML=npMembers.map(m=>`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--accent-bg);border:1px solid var(--accent);border-radius:12px;padding:4px 10px;font-size:12px;color:var(--accent2);">${m}<button onclick="rmNpMem('${m}')" style="background:none;border:none;color:var(--accent2);cursor:pointer;font-size:13px;line-height:1;padding:0;">×</button></span>`).join('');
}
function saveNewProj(){
  const name=document.getElementById('np-name').value.trim();
  if(!name){alert('여행 이름을 입력하세요.');return;}
  const type=getChip('np-type')||'solo';
  const cEl=document.getElementById('np-country');
  const country=cEl.value.trim();
  const flag=cEl.dataset.flag||COUNTRIES.find(c=>c.n===country)?.f||'🌍';

// CALENDAR
// ══════════════════════════════════
function renderCal(){
  const mns=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month').textContent=`${calY}년 ${mns[calM]}`;
  document.getElementById('cal-hdr').innerHTML=['일','월','화','수','목','금','토']
    .map(d=>`<div class="chdr">${d}</div>`).join('');
  const first=new Date(calY,calM,1).getDay();
  const last=new Date(calY,calM+1,0).getDate();
  const today=todayStr(); const p=curProj;
  let html='';
  for(let i=0;i<first;i++){
    const d=new Date(calY,calM,-(first-1-i));
    html+=`<div class="cell other">${d.getDate()}</div>`;
  }
  for(let d=1;d<=last;d++){
    const ds=`${calY}-${pad(calM+1)}-${pad(d)}`;
    const day=p&&p.days&&p.days[ds];
    const hasE=day&&(day.expenses||[]).length>0;
    const hasD=day&&(day.diary||'').trim();
    let cls='cell';
    if(ds===today)cls+=' today';
    if(ds===selDate)cls+=' sel';
    if(hasE)cls+=' has-e';
    if(hasD)cls+=' has-d';
    html+=`<div class="${cls}" onclick="selDay('${ds}')">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}
function calPrev(){
  calM--;if(calM<0){calM=11;calY--;}
  selDate=null;
  document.getElementById('day-panel').style.display='none';
  document.getElementById('month-list').style.display='';
  renderCal();renderMonthList();
}
function calNext(){
  calM++;if(calM>11){calM=0;calY++;}
  selDate=null;
  document.getElementById('day-panel').style.display='none';
  document.getElementById('month-list').style.display='';
  renderCal();renderMonthList();
}
function selDay(ds){
  selDate=ds;renderCal();renderDayPanel();
  document.getElementById('day-panel').style.display='';
  document.getElementById('month-list').style.display='none';
  setTimeout(()=>document.getElementById('day-panel').scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}

function filterMonthList(){
  const q=(document.getElementById('proj-q')||{}).value||'';
  if(!q){renderMonthList();return;}
  const p=curProj; const el=document.getElementById('month-list');
  const dns=['일','월','화','수','목','금','토'];
  let html=`<div class="sec-hdr"><span class="sec-t">검색 결과</span></div>`;
  let found=false;
  Object.entries(p.days||{}).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,day])=>{
    const matchExp=(day.expenses||[]).filter(e=>getCatNames(e.catIds||[e.catId]).includes(q)||(e.memo||'').includes(q));
    const matchDiary=(day.diary||'').includes(q)&&(day.diary||'').trim();
    if(!matchExp.length&&!matchDiary)return;
    found=true;
    const dt=new Date(date+'T00:00:00');
    html+=`<div style="margin-bottom:8px;">
      <div style="font-size:11px;font-weight:700;color:var(--text3);padding:2px 0 5px;">${dt.getMonth()+1}/${dt.getDate()}(${dns[dt.getDay()]})</div>
      ${matchDiary?`<div class="li" onclick="openDiaryDetail('${date}')"><div class="li-bar" style="background:var(--purple);"></div><div class="li-ico diary">📖</div><div class="li-body"><div class="li-title">일기</div></div><span class="li-arr">›</span></div>`:''}
      ${matchExp.map(e=>`<div class="li" onclick="openExpDetail('${date}','${e.id}')">
        <div class="li-bar" style="background:var(--accent);"></div>
        <div class="li-ico exp">${(db.cats.find(c=>c.id===(e.catIds||[e.catId])[0])||{icon:'💡'}).icon}</div>
        <div class="li-body"><div class="li-title">${getCatNames(e.catIds||[e.catId])}</div></div>
        <div class="li-r">${e.amtLocal&&e.currency&&e.currency!=='KRW'?`<div style="font-size:12px;font-weight:700;color:var(--text);">${fmtLocal2(e.amtLocal,e.currency)}</div><div style="font-size:10px;color:var(--text3);">(${fmtW(e.amtKRW||0)})</div>`:`<div class="li-amt">${fmtW(e.amtKRW||0)}</div>`}</div>
        <span class="li-arr">›</span></div>`).join('')}
    </div>`;
  });
  if(!found)html+=`<div class="empty" style="padding:28px;"><div class="empty-ico" style="font-size:32px;">🔍</div><div class="empty-s">검색 결과 없음</div></div>`;
  el.innerHTML=html;
}

function getCatNames(ids){
  return (ids||[]).map(id=>{const c=db.cats.find(c=>c.id===id);return c?c.icon+' '+c.name:'';}).filter(Boolean).join(' + ');
}

function updateSelLabel(){
  const ids=[...document.querySelectorAll('#ae-cats .chip.on')].map(c=>c.dataset.v);
  const lbl=document.getElementById('ae-sel-label');
  if(!lbl)return;
  if(ids.length){
    lbl.style.display='';
    lbl.textContent='선택: '+ids.map(id=>{const c=db.cats.find(c=>c.id===id);return c?c.icon+' '+c.name:'';}).filter(Boolean).join(' + ');
  } else lbl.style.display='none';
}

function updateKRWPrev(){
  updateSelLabel();
  const p=curProj;
  const isLocal=p&&p.currency&&p.currency!=='KRW';
  if(!isLocal)return;
  const amt=parseFloat((document.getElementById('ae-amt')?.value||'').replace(/,/g,''))||0;
  const rate=parseFloat((document.getElementById('ae-rate')?.value||'').replace(/,/g,''))||0;
  const prev=document.getElementById('ae-prev');
  if(!prev)return;
  if(amt&&rate){
    prev.style.display='';
    prev.textContent=`${fmtW(Math.round(amt*rate))}  (${fmtN(amt)} ${p.currency} × ${fmtN(rate)})`;
  } else prev.style.display='none';
}

async function fetchRate(cur,dateStr){
  const spin=document.getElementById('ae-spin');
  if(spin)spin.style.display='';
  try{
    let res=await fetch(`https://api.frankfurter.app/${dateStr}?from=${cur}&to=KRW`);
    if(res.ok){const d=await res.json();if(d.rates?.KRW){setRate(Math.round(d.rates.KRW));return;}}
  }catch{}
  try{
    let res=await fetch(`https://api.frankfurter.app/latest?from=${cur}&to=KRW`);
    if(res.ok){const d=await res.json();if(d.rates?.KRW)setRate(Math.round(d.rates.KRW));}
  }catch{}
  finally{if(spin)spin.style.display='none';}
}
function setRate(v){
  const inp=document.getElementById('ae-rate');
  if(inp){inp.value=v;updateKRWPrev();}
  const spin=document.getElementById('ae-spin');if(spin)spin.style.display='none';
}

function saveExp(expId){
  const p=curProj;
  if(!p){alert('프로젝트를 선택하세요.');return;}
  const catIds=[...document.querySelectorAll('#ae-cats .chip.on')].map(b=>b.dataset.v);
  if(!catIds.length){alert('항목을 하나 이상 선택하세요.');return;}
  const isLocal=p.currency&&p.currency!=='KRW';
  const amtRaw=(document.getElementById('ae-amt')?.value||'').replace(/,/g,'');
  const amtLocal=parseFloat(amtRaw)||0;
  if(!amtLocal){alert('금액을 입력하세요.');return;}
  const rateRaw=(document.getElementById('ae-rate')?.value||'').replace(/,/g,'');
  const rate=isLocal?(parseFloat(rateRaw)||1):1;
  const amtKRW=isLocal?Math.round(amtLocal*rate):amtLocal;
  const shared=getChip('ae-shared')==='shared';
  const payType=getChip('ae-pay')||'card';
  const memo=document.getElementById('ae-memo')?.value.trim()||'';
  const dateInput=document.getElementById('ae-date');
  const targetDate=dateInput?dateInput.value:(selDate||todayStr());
  if(!targetDate){alert('날짜를 입력하세요.');return;}
  selDate=targetDate;
  if(!p.days[targetDate])p.days[targetDate]={expenses:[],diary:'',photo:null};
  const rec={catId:catIds[0],catIds,amtLocal,amtKRW,currency:p.currency,
    rate:isLocal?rate:null,shared,payType,memo,date:targetDate};
  if(expId){
    Object.values(p.days).forEach(day=>{
      const idx=(day.expenses||[]).findIndex(e=>e.id===expId);
      if(idx>=0)day.expenses[idx]={...day.expenses[idx],...rec};
    });
  } else {
    p.days[targetDate].expenses.push({id:uid(),...rec,createdAt:Date.now()});
  }
  save();closeSheet();renderProjSummary();renderCal();renderDayPanel();renderMonthList();
}

function deleteExp(expId){
  if(!confirm('이 지출을 삭제할까요?'))return;
  const p=curProj;if(!p||!selDate)return;
  const day=p.days[selDate];
  if(day)day.expenses=(day.expenses||[]).filter(e=>e.id!==expId);
  save();closeSheet();
  if(document.getElementById('sc-detail').classList.contains('on'))closeDetail();

function onDiaryPhotoSelected(inp){
  const file=inp.files[0]; if(!file) return;
  const status=document.getElementById('diary-save-status');
  const saveBtn=document.getElementById('diary-save-btn');
  if(status){status.style.display='';status.textContent='사진 압축 중…';}
  if(saveBtn) saveBtn.disabled=true;

  const reader=new FileReader();
  reader.onload=e=>{
    // Canvas로 리사이즈 + JPEG 압축 (최대 800px, quality 0.7 → 약 50~100KB)
    const img=new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.width, h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.72);
      const kb=Math.round(compressed.length*0.75/1024);

      _diaryPhotoData=compressed;

      // 미리보기 업데이트
      const preview=document.getElementById('photo-preview');
      const previewImg=document.getElementById('photo-img');
      const addBtn=document.getElementById('photo-add-btn');
      if(previewImg) previewImg.src=compressed;
      if(preview) preview.style.display='';
      if(addBtn) addBtn.style.display='none';
      if(status){status.style.display='';status.textContent=`사진 준비 완료 (${kb}KB)`;}
      setTimeout(()=>{if(status)status.style.display='none';},1500);
      if(saveBtn) saveBtn.disabled=false;
    };
    img.onerror=()=>{
      alert('사진을 읽을 수 없습니다.');
      if(status) status.style.display='none';
      if(saveBtn) saveBtn.disabled=false;
    };
    img.src=e.target.result;
  };
  reader.onerror=()=>{
    alert('파일을 읽을 수 없습니다.');
    if(status) status.style.display='none';
    if(saveBtn) saveBtn.disabled=false;
  };
  reader.readAsDataURL(file);
}

function rmDiaryPhoto(){
  _diaryPhotoData='REMOVE';
  const preview=document.getElementById('photo-preview');
  const addBtn=document.getElementById('photo-add-btn');
  if(preview) preview.style.display='none';
  if(addBtn) addBtn.style.display='';
}

function saveDiary(){
  const p=curProj;
  if(!p||!selDate){alert('날짜를 선택하세요.');return;}
  if(!p.days[selDate]) p.days[selDate]={expenses:[],diary:'',photo:null};
  const txt=document.getElementById('diary-txt');
  p.days[selDate].diary=txt?txt.value:'';

  if(_diaryPhotoData==='REMOVE'){
    p.days[selDate].photo=null;
  } else if(_diaryPhotoData!==null){
    p.days[selDate].photo=_diaryPhotoData;
  }
  _diaryPhotoData=null;

  try{
    save();
  } catch(err){
    // LocalStorage 용량 초과 시 사진 제거 후 재시도
    if(err.name==='QuotaExceededError'||err.message.includes('quota')||err.message.includes('exceeded')){
      alert('저장 공간이 부족합니다. 사진 없이 일기만 저장합니다.');
      p.days[selDate].photo=null;
      try{save();}catch(e2){alert('저장 실패: '+e2.message);return;}
    } else {
      alert('저장 오류: '+err.message);
      return;
    }
  }
  closeSheet();renderCal();renderDayPanel();renderMonthList();
}

function calcSettle(){
  const p=_getSettleProj();if(!p)return;
  const from=document.getElementById('st-from')?.value||'';
  const to=document.getElementById('st-to')?.value||'';
  const members=['나',...(p.members||[])];
  const n=members.length||1;
  const dns=['일','월','화','수','목','금','토'];

  // 기간 내 날짜별 지출 수집
  const dayEntries=Object.entries(p.days||{})
    .filter(([d])=>d>=from&&d<=to)
    .sort(([a],[b])=>a.localeCompare(b));

  let all=[];
  dayEntries.forEach(([date,day])=>(day.expenses||[]).forEach(e=>all.push({...e,date})));

  const grand=all.reduce((s,e)=>s+(e.amtKRW||0),0);
  const sharedTotal=all.filter(e=>e.shared).reduce((s,e)=>s+(e.amtKRW||0),0);
  const personalTotal=grand-sharedTotal;
  const perPerson=n>1?Math.round(sharedTotal/n):0;

  // 날짜별 상세 내역 HTML
  const detailHTML=dayEntries.map(([date,day])=>{
    const exps=day.expenses||[];
    if(!exps.length)return'';
    const dt=new Date(date+'T00:00:00');
    const dl=`${dt.getMonth()+1}월 ${dt.getDate()}일 (${dns[dt.getDay()]})`;
    const dayTotal=exps.reduce((s,e)=>s+(e.amtKRW||0),0);
    const rows=exps.map(e=>{
      const cats=(e.catIds||[e.catId]).map(id=>{
        const cat=db.cats.find(c=>c.id===id);return cat?cat.icon+' '+cat.name:'';
      }).filter(Boolean).join(' + ');
      const localStr=e.amtLocal&&e.currency&&e.currency!=='KRW'
        ?`<span style="color:var(--text3);font-size:11px;">${fmtLocal2(e.amtLocal,e.currency)}</span> `:'';
      const payIcon=e.payType==='cash'?'💵':'💳';
      const shBadge=e.shared
        ?`<span style="background:var(--amber-bg);color:var(--amber);border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700;">공통</span>`
        :`<span style="background:var(--accent-bg);color:var(--accent2);border-radius:8px;padding:1px 6px;font-size:10px;font-weight:700;">개인</span>`;
      const memo=e.memo?`<span style="color:var(--text3);font-size:11px;"> · ${esc(e.memo)}</span>`:'';
      return`<div style="display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);">
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;color:var(--text);">${cats}${memo}</div>
          <div style="margin-top:3px;display:flex;gap:5px;align-items:center;">${shBadge} <span style="font-size:11px;color:var(--text3);">${payIcon}</span></div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px;">
          ${localStr}
          <div style="font-size:13px;font-weight:700;color:var(--text);">${fmtW(e.amtKRW||0)}</div>
        </div>
      </div>`;
    }).join('');
    return`<div class="settle-day-card">
      <div class="settle-day-hdr">
        <span style="font-size:13px;font-weight:700;color:var(--text);">${dl}</span>
        <span style="font-size:13px;font-weight:700;color:var(--accent2);">${fmtW(dayTotal)}</span>
      </div>
      <div style="padding:0 12px;">${rows}</div>
    </div>`;
  }).join('');

  document.getElementById('settle-body-res').innerHTML=`
  <!-- 요약 -->
  <div class="card" style="margin-bottom:10px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-size:12px;color:var(--text3);">기간 총 지출</span>
      <span style="font-size:20px;font-weight:700;color:var(--text);">${fmtW(grand)}</span>
    </div>
    <div style="display:flex;gap:8px;">
      <div style="flex:1;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:10px;padding:8px 10px;text-align:center;">
        <div style="font-size:10px;color:var(--accent2);margin-bottom:3px;">개인</div>
        <div style="font-size:14px;font-weight:700;color:var(--accent2);">${fmtW(personalTotal)}</div>
      </div>
      <div style="flex:1;background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:10px;padding:8px 10px;text-align:center;">
        <div style="font-size:10px;color:var(--amber);margin-bottom:3px;">공통</div>
        <div style="font-size:14px;font-weight:700;color:var(--amber);">${fmtW(sharedTotal)}</div>
      </div>
      ${n>1?`<div style="flex:1;background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;padding:8px 10px;text-align:center;">
        <div style="font-size:10px;color:var(--green);margin-bottom:3px;">1인당</div>
        <div style="font-size:14px;font-weight:700;color:var(--green);">${fmtW(perPerson)}</div>
      </div>`:''}
    </div>
  </div>

  <!-- 동반자 정산 -->
  ${n>1?`<div class="card" style="margin-bottom:10px;">
    <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:8px;">동반자별 받을 금액</div>
    ${(p.members||[]).map(m=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);">
      <span style="font-size:13px;color:var(--text);">👤 ${m}</span>
      <span style="font-size:13px;font-weight:700;color:var(--green);">${fmtW(perPerson)} 받기</span>
    </div>`).join('')}
  </div>`:''}

  <!-- 날짜별 상세 내역 -->
  <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;padding:8px 0 10px;">상세 지출 내역</div>
  ${detailHTML||`<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px;">이 기간에 지출 내역이 없습니다</div>`}`;
}

function onSettleProjChange(){
  const pid=document.getElementById('st-proj')?.value;
  const p=db.projects.find(x=>x.id===pid);
  if(!p)return;
  const dates=Object.keys(p.days||{}).sort();
  if(dates.length){
    document.getElementById('st-from').value=dates[0];
    document.getElementById('st-to').value=dates[dates.length-1];
  }
  calcSettle();
}

function _getSettleProj(){
  const pid=document.getElementById('st-proj')?.value;
  return pid?db.projects.find(x=>x.id===pid):(curProj||db.projects[0]);
}

function exportSettlePDF(){
  const p=_getSettleProj(); if(!p)return;
  const from=document.getElementById('st-from')?.value||'';
  const to=document.getElementById('st-to')?.value||'';

  // 버튼 로딩 상태
  const btn=event.currentTarget||document.querySelector('[onclick*="exportSettlePDF"]');
  const origTxt=btn?btn.textContent:'';
  if(btn){btn.textContent='⏳ 생성 중…';btn.disabled=true;}
  const restore=()=>{if(btn){btn.textContent=origTxt;btn.disabled=false;}};

  const run=()=>_buildPDF(p,from,to,restore);

  if(!window.jspdf){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=run;
    s.onerror=()=>{alert('PDF 라이브러리 로드 실패. 인터넷 연결을 확인해주세요.');restore();};
    document.head.appendChild(s);
  } else run();
}


function _buildPDF(p,from,to,restore){
  // 한글 폰트 동적 로드 후 PDF 생성
  if(!window._krFontB64){
    // CDN에서 Nanum Gothic TTF 로드 (약 3MB, 한글 완벽 지원)
    fetch('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf')
      .then(()=>{}) // test CDN
      .catch(()=>{});

    fetch('https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/nanumgothic/NanumGothic-Regular.ttf')
      .then(r=>r.arrayBuffer())
      .then(buf=>{
        window._krFontBuf=buf;
        _buildPDFWithFont(p,from,to,restore);
      })
      .catch(()=>{
        // 폰트 로드 실패 시 영문으로 대체
        _buildPDFLatinFallback(p,from,to,restore);
      });
  } else {
    _buildPDFWithFont(p,from,to,restore);
  }

function _buildPDFWithFont(p,from,to,restore){
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});

    // 한글 폰트 등록
    if(window._krFontBuf){
      const fontData=_arrayBufferToBase64(window._krFontBuf);
      doc.addFileToVFS('NanumGothic.ttf',fontData);
      doc.addFont('NanumGothic.ttf','NanumGothic','normal');
      doc.setFont('NanumGothic');
    }

    _writePDFContent(doc,p,from,to);
    const fname=`BuenCamino_${from}_${to}.pdf`;
    doc.save(fname);
  }catch(e){
    console.error(e);
    alert('PDF 생성 오류: '+e.message);

function _buildPDFLatinFallback(p,from,to,restore){
  try{

    doc.save(fname);
  }catch(e){alert('PDF 생성 오류: '+e.message);}
  finally{if(restore)restore();}
}

function _arrayBufferToBase64(buf){
  const bytes=new Uint8Array(buf);
  let b='';
  for(let i=0;i<bytes.byteLength;i+=1024){
    b+=String.fromCharCode(...bytes.subarray(i,Math.min(i+1024,bytes.byteLength)));
  }
  return btoa(b);
}

function _ko(s,fallback){
  // 폰트 없을 때 영문 대체 사용
  return window._krFontBuf?s:(fallback||s);
}

function _writePDFContent(doc,p,from,to,latinOnly){
  const W=210,M=14,RW=W-M*2;
  let y=18;
  const dns=['일','월','화','수','목','금','토'];
  const members=['나',...(p.members||[])];
  const n=members.length||1;

  const all=[];
  Object.entries(p.days||{}).forEach(([date,day])=>{
    if(date>=from&&date<=to)(day.expenses||[]).forEach(e=>all.push({...e,date}));
  });
  const grand=all.reduce((s,e)=>s+(e.amtKRW||0),0);
  const sharedTotal=all.filter(e=>e.shared).reduce((s,e)=>s+(e.amtKRW||0),0);
  const personalTotal=grand-sharedTotal;
  const perPerson=n>1?Math.round(sharedTotal/n):0;

  const addPage=()=>{doc.addPage();y=14;};
  const chk=(h)=>{if(y+h>282)addPage();};
  const KRW=(v)=>`\u20A9${v.toLocaleString()}`;

  // ── 헤더 배경 ──
  doc.setFillColor(15,21,40);
  doc.rect(0,0,W,30,'F');
  doc.setTextColor(240,244,255);
  doc.setFontSize(15);doc.setFont(window._krFontBuf?'NanumGothic':'helvetica','normal');
  doc.text('Buen Camino  Travel Report',M,11);
  doc.setFontSize(9);
  const projLine=latinOnly?`${from} ~ ${to}  ${p.currency}`:`${p.name}  ${from} ~ ${to}  ${p.currency}`;
  doc.text(projLine,M,19);
  const memLine=latinOnly?`Members: ${members.join(', ')}`:`동반자: ${members.join(', ')}`;
  doc.text(memLine,M,25);
  y=38;

  // ── Summary ──
  doc.setTextColor(30,30,30);
  doc.setFontSize(11);
  doc.text('Summary',M,y);y+=4;
  doc.setDrawColor(180);doc.line(M,y,W-M,y);y+=5;
  doc.setFontSize(9);

  const sumData=[
    [latinOnly?'Total':'총 지출', KRW(grand)],
    [latinOnly?'Personal':'개인 지출', KRW(personalTotal)],
    [latinOnly?'Shared (common)':'공통 지출', KRW(sharedTotal)],
    ...(n>1?[[latinOnly?'Per person':'1인당 공통 부담', KRW(perPerson)]]:[]),
  ];
  sumData.forEach(([l,v])=>{
    doc.setFont(window._krFontBuf?'NanumGothic':'helvetica','normal');
    doc.text(l,M+2,y);
    doc.text(v,W-M,y,{align:'right'});
    y+=5;
  });

  if(n>1){
    y+=2;
    const settleTitle=latinOnly?'Settlement':'정산 내역';
    doc.setFont(window._krFontBuf?'NanumGothic':'helvetica','normal');
    doc.text(latinOnly?'Settlement':'정산 내역',M+2,y);y+=5;
    members.slice(1).forEach(m=>{
      const line=latinOnly?`  ${m} → ${KRW(perPerson)}`:`  ${m} → ${KRW(perPerson)} 받기`;
      doc.text(line,M+3,y);y+=4.5;
    });
  }
  y+=5;

  // ── 상세 내역 ──
  chk(8);
  doc.setFontSize(11);
  doc.text(latinOnly?'Expense Detail':'상세 지출 내역',M,y);y+=4;
  doc.setDrawColor(180);doc.line(M,y,W-M,y);y+=5;

  const dayEntries=Object.entries(p.days||{})
    .filter(([d])=>d>=from&&d<=to&&(p.days[d].expenses||[]).length)
    .sort(([a],[b])=>a.localeCompare(b));

  dayEntries.forEach(([date,day])=>{
    chk(12);
    const dt=new Date(date+'T00:00:00');
    const dl=`${dt.getMonth()+1}/${dt.getDate()}(${dns[dt.getDay()]})`;
    const dayExps=day.expenses||[];
    const dayTotal=dayExps.reduce((s,e)=>s+(e.amtKRW||0),0);

    // 페소 합계 + 대표 환율 계산
    const isLocal=p.currency&&p.currency!=='KRW';
    let dayLocalTotal=0, dayRate=0, rateCount=0;
    if(isLocal){
      dayExps.forEach(e=>{
        if(e.amtLocal) dayLocalTotal+=e.amtLocal;
        if(e.rate){dayRate+=e.rate;rateCount++;}
      });
      dayRate=rateCount>0?Math.round(dayRate/rateCount):0;
    }

    // 날짜 헤더 (2줄 높이 확보)
    const hdrH=isLocal&&dayLocalTotal?9:6;
    doc.setFillColor(235,240,250);
    doc.rect(M,y-3.5,RW,hdrH,'F');
    doc.setFontSize(9);doc.setTextColor(15,21,40);
    doc.text(dl,M+2,y);
    doc.text(KRW(dayTotal),W-M,y,{align:'right'});
    if(isLocal&&dayLocalTotal&&dayRate){
      doc.setFontSize(7.5);doc.setTextColor(80,80,160);
      const sym={JPY:'¥',USD:'$',PHP:'₱',THB:'฿',VND:'₫',EUR:'€',GBP:'£',HKD:'HK$',SGD:'S$',TWD:'NT$',MYR:'RM',IDR:'Rp',CNY:'¥',AUD:'A$',CAD:'C$',CHF:'Fr'};
      const s=sym[p.currency]||p.currency;
      doc.text(`${s}${Math.round(dayLocalTotal).toLocaleString()}  @${dayRate.toLocaleString()}`,M+2,y+4);
      doc.setTextColor(30,30,30);
      y+=hdrH+2;
    } else {
      doc.setTextColor(30,30,30);
      y+=7;
    }

    (day.expenses||[]).forEach(e=>{
      chk(8);
      const cats=(e.catIds||[e.catId]).map(id=>{
        const cat=db.cats.find(c=>c.id===id);return cat?cat.name:'';
      }).filter(Boolean).join('+');
      const memo=e.memo?' · '+e.memo:'';
      const payLbl=latinOnly?(e.payType==='cash'?'Cash':'Card'):(e.payType==='cash'?'현금':'카드');
      const shLbl=latinOnly?(e.shared?'Shared':'Personal'):(e.shared?'공통':'개인');
      const localStr=e.amtLocal&&e.currency&&e.currency!=='KRW'
        ?`${e.currency} ${Math.round(e.amtLocal).toLocaleString()}  `:'';
      const label=`  ${cats}${memo}`;
      const meta=`[${shLbl}/${payLbl}]`;

      doc.setFontSize(8.5);
      // 항목명 (긴 경우 줄바꿈)
      const lines=doc.splitTextToSize(label, RW*0.55);
      doc.text(lines,M+2,y);
      // 구분
      doc.setTextColor(120,120,120);
      doc.setFontSize(7.5);
      doc.text(meta,M+RW*0.57,y);
      doc.setTextColor(30,30,30);
      doc.setFontSize(8.5);
      // 금액
      doc.text(localStr+KRW(e.amtKRW||0),W-M,y,{align:'right'});
      y+=lines.length>1?lines.length*4.2+1:5.5;
    });

    doc.setDrawColor(210);doc.line(M,y-1,W-M,y-1);y+=2;
  });

  // 푸터
  chk(8);
  doc.setFontSize(7);doc.setTextColor(170,170,170);
  doc.text(`Generated by Buen Camino  •  ${new Date().toLocaleDateString('ko-KR')}`,W/2,287,{align:'center'});
}

function _shareWithPDF(p,from,to,txt){
  // PDF 생성 후 파일로 공유
  const tryShareWithFile=(pdfBlob)=>{
    const fname=`BuenCamino_${p.name}_${from}_${to}.pdf`.replace(/[\s/]/g,'_');
    const file=new File([pdfBlob],fname,{type:'application/pdf'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({title:`${p.name} 정산`,text:txt,files:[file]})
        .catch(()=>_shareTextOnly(txt));
    } else {
      // 파일 공유 미지원 → 텍스트만 공유 + PDF 다운로드
      _shareTextOnly(txt);
      // PDF도 자동 다운로드
      const url=URL.createObjectURL(pdfBlob);
      const a=document.createElement('a');a.href=url;a.download=fname;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),3000);
    }
  };

  // jsPDF로 PDF blob 생성
  const makePDFBlob=()=>{
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      if(window._krFontBuf){
        const fd=_arrayBufferToBase64(window._krFontBuf);
        doc.addFileToVFS('NanumGothic.ttf',fd);
        doc.addFont('NanumGothic.ttf','NanumGothic','normal');
        doc.setFont('NanumGothic');
      }
      _writePDFContent(doc,p,from,to);
      return doc.output('blob');
    }catch(e){return null;}
  };

  if(window.jspdf){
    const blob=makePDFBlob();
    if(blob) tryShareWithFile(blob);
    else _shareTextOnly(txt);
  } else {
    // jsPDF 없으면 텍스트만
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>{
      const blob=makePDFBlob();
      if(blob) tryShareWithFile(blob);
      else _shareTextOnly(txt);
    };
    s.onerror=()=>_shareTextOnly(txt);
    document.head.appendChild(s);
  }
}

function _shareTextOnly(txt){
  if(navigator.share) navigator.share({title:'',text:txt}).catch(()=>{
    navigator.clipboard?.writeText(txt);alert('클립보드에 복사됐어요!');
  });
  else{navigator.clipboard?.writeText(txt);alert('클립보드에 복사됐어요!');}
}

  inp.value='';

  `).join('')}
  <div style="padding:8px 0 20px;">
    <button class="btn btn-g btn-full" onclick="openAddCat()">＋ 새 카테고리 추가</button>
  </div>`;
}

function todayStr(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function pad(n){return String(n).padStart(2,'0');}
function fmtW(n){return'₩'+Math.round(n).toLocaleString();}
function fmtN(n){if(!n&&n!==0)return'';return(Math.round(n*100)/100).toLocaleString();}
function fmtComma(n){if(!n&&n!==0)return'';return Number(n).toLocaleString();}
function fmtLocal2(amt,cur){if(!amt)return'';const sym={JPY:'¥',USD:'$',PHP:'₱',THB:'฿',VND:'₫',EUR:'€',GBP:'£',HKD:'HK$',SGD:'S$',TWD:'NT$',MYR:'RM',IDR:'Rp',CNY:'¥',AUD:'A$',CAD:'C$',CHF:'Fr'};return(sym[cur]||cur)+Math.round(amt).toLocaleString();}
function fmtInputComma(inp){const raw=inp.value.replace(/,/g,'');const n=parseFloat(raw);if(!isNaN(n)&&raw!==''){const pos=inp.selectionStart;const oldLen=inp.value.length;inp.value=n.toLocaleString();const newLen=inp.value.length;inp.setSelectionRange(pos+(newLen-oldLen),pos+(newLen-oldLen));}
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── 계산기 ──
let _calcExpr='',_calcFromExp=false;
function openCalc(){_calcFromExp=false;_showCalc();}
function openCalcFromExp(){_calcFromExp=true;_showCalc();}
function _showCalc(){
  const fromExpBtn=_calcFromExp?`<button class="btn btn-p btn-full" onclick="_useCalcResult()" style="margin-top:8px;">금액으로 가져오기</button>`:'';
  showSheet(`
    <div class="s-handle"></div>
    <div class="s-title">🧮 계산기</div>
    <div class="calc-wrap">
      <div class="calc-display">
        <div class="calc-expr" id="calc-expr"></div>
        <div class="calc-result" id="calc-res">0</div>
      </div>
      <div class="calc-grid">
        <button class="cbtn clr" onclick="calcAC()">AC</button>
        <button class="cbtn op" onclick="calcOp('±')">±</button>
        <button class="cbtn op" onclick="calcOp('%')">%</button>
        <button class="cbtn op" onclick="calcOp('÷')">÷</button>
        <button class="cbtn" onclick="calcNum('7')">7</button>
        <button class="cbtn" onclick="calcNum('8')">8</button>
        <button class="cbtn" onclick="calcNum('9')">9</button>
        <button class="cbtn op" onclick="calcOp('×')">×</button>
        <button class="cbtn" onclick="calcNum('4')">4</button>
        <button class="cbtn" onclick="calcNum('5')">5</button>
        <button class="cbtn" onclick="calcNum('6')">6</button>
        <button class="cbtn op" onclick="calcOp('−')">−</button>
        <button class="cbtn" onclick="calcNum('1')">1</button>
        <button class="cbtn" onclick="calcNum('2')">2</button>
        <button class="cbtn" onclick="calcNum('3')">3</button>
        <button class="cbtn op" onclick="calcOp('+')">+</button>
        <button class="cbtn wide" onclick="calcNum('0')">0</button>
        <button class="cbtn" onclick="calcDot()">.</button>
        <button class="cbtn eq" onclick="calcEq()">=</button>
      </div>
    </div>
    ${fromExpBtn}
  `);
  _calcExpr='';_calcRender();
}
let _calcCur='0',_calcOp='',_calcPrev=0,_calcNewNum=true;
function _calcRender(){
  const expr=document.getElementById('calc-expr');
  const res=document.getElementById('calc-res');
  if(expr)expr.textContent=_calcExpr;
  if(res)res.textContent=parseFloat(_calcCur).toLocaleString();
}
function calcNum(n){
  if(_calcNewNum){_calcCur=n;_calcNewNum=false;}
  else _calcCur=(_calcCur==='0'?n:_calcCur+n);
  _calcRender();
}
function calcDot(){
  if(_calcNewNum){_calcCur='0.';_calcNewNum=false;}
  else if(!_calcCur.includes('.'))_calcCur+='.';
  _calcRender();
}
function calcOp(op){
  if(op==='±'){_calcCur=String(-parseFloat(_calcCur));_calcRender();return;}
  if(op==='%'){_calcCur=String(parseFloat(_calcCur)/100);_calcRender();return;}
  calcEq();
  _calcOp=op;_calcPrev=parseFloat(_calcCur);_calcNewNum=true;
  _calcExpr=parseFloat(_calcCur).toLocaleString()+' '+op;
  _calcRender();
}
function calcEq(){
  if(!_calcOp)return;
  const a=_calcPrev,b=parseFloat(_calcCur);
  let r=a;
  if(_calcOp==='+'||_calcOp==='+')r=a+b;
  else if(_calcOp==='−')r=a-b;
  else if(_calcOp==='×')r=a*b;
  else if(_calcOp==='÷')r=b!==0?a/b:0;
  _calcExpr+=_calcCur+' =';
  _calcCur=String(Math.round(r*1e8)/1e8);
  _calcOp='';_calcNewNum=true;_calcRender();
}
function calcAC(){_calcCur='0';_calcOp='';_calcPrev=0;_calcNewNum=true;_calcExpr='';_calcRender();}
function _useCalcResult(){
  const val=parseFloat(_calcCur);
  const inp=document.getElementById('ae-amt');
  if(inp){inp.value=val.toLocaleString();updateKRWPrev();}
  closeSheet();
  // Reopen expense sheet - need to keep state
  // Simpler: just close and user sees value was applied
}
