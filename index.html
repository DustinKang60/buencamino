<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#080c18"/>
<link rel="manifest" href="manifest.json"/>
<title>Buen Camino</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080c18;
  --surface:#0f1528;
  --surface2:#161d35;
  --surface3:#1e2744;
  --border:#1e2744;
  --border2:#2a3560;
  --border3:#374880;
  --text:#f0f4ff;
  --text2:#8892b0;
  --text3:#4a5578;
  --accent:#4f8cff;
  --accent2:#7eb3ff;
  --accent-bg:#0a1a3a;
  --accent-glow:rgba(79,140,255,0.15);
  --green:#00d68f;--green-bg:#002a1c;--green-dim:#004d34;
  --red:#ff5c7a;--red-bg:#2a0010;
  --amber:#ffb740;--amber-bg:#2a1800;
  --purple:#a78bfa;--purple-bg:#1a0f3a;
  --teal:#2dd4bf;--teal-bg:#002a26;
  --radius:16px;--radius-sm:10px;--radius-lg:24px;--radius-xl:32px;
  --ff:'Noto Sans KR',sans-serif;
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --shadow-sm:0 2px 12px rgba(0,0,0,.4);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--ff);}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}

/* ── TopBar ── */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 8px 0 4px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  padding-top:env(safe-area-inset-top);
  position:relative;
}
.topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-glow),transparent);}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:2px;min-width:80px;}
.topbar-right{justify-content:flex-end;}

/* ── Icon Buttons ── */
.ibtn{
  background:none;border:none;color:var(--text2);cursor:pointer;
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all .15s;flex-shrink:0;
}
.ibtn:active{background:var(--surface3);color:var(--text);}
.ibtn.accent{color:var(--accent);}
.back-btn{display:flex;align-items:center;gap:2px;color:var(--accent);background:none;border:none;
  cursor:pointer;font-family:var(--ff);font-size:14px;font-weight:600;padding:8px 4px;border-radius:10px;}
.back-btn:active{opacity:.7;}

/* ── Nav ── */
.nav{
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 0;border:none;background:none;color:var(--text3);
  font-family:var(--ff);font-size:10px;cursor:pointer;transition:color .15s;
  position:relative;
}
.nav-btn.active{color:var(--accent);}
.nav-btn.active::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:32px;height:2px;border-radius:0 0 2px 2px;background:var(--accent);
}
.nav-icon{font-size:20px;line-height:1;}

/* ── Scroll ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}

/* ── Screens ── */
.screen{display:none;flex-direction:column;height:100%;}
.screen.active{display:flex;}

/* ── Cards ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:12px;
}
.card-glass{
  background:linear-gradient(135deg,rgba(15,21,40,.9),rgba(22,29,53,.9));
  border:1px solid var(--border2);border-radius:var(--radius);padding:16px;
  backdrop-filter:blur(10px);
}
.card-tap{cursor:pointer;transition:all .15s;}
.card-tap:active{transform:scale(.98);opacity:.85;}

/* ── Buttons ── */
.btn{
  border:none;border-radius:var(--radius-sm);padding:12px 20px;cursor:pointer;
  font-family:var(--ff);font-size:15px;font-weight:600;transition:all .15s;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.btn-primary{
  background:linear-gradient(135deg,#3a7fff,#5b8fff);color:#fff;
  box-shadow:0 4px 20px rgba(79,140,255,.35);
}
.btn-primary:active{transform:scale(.97);box-shadow:0 2px 10px rgba(79,140,255,.25);}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.btn-ghost:active{background:var(--surface3);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,92,122,.3);}
.btn-danger:active{opacity:.8;}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,214,143,.3);}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;}
.btn-full{width:100%;}

/* ── Form ── */
.form-group{margin-bottom:18px;}
.form-label{
  font-size:11px;color:var(--text3);margin-bottom:7px;
  display:block;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
}
.form-input{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:13px 14px;color:var(--text);
  font-family:var(--ff);font-size:16px;outline:none;transition:border-color .15s;
}
.form-input:focus{border-color:var(--accent);background:var(--accent-bg);}
.form-input::placeholder{color:var(--text3);}
textarea.form-input{resize:none;min-height:100px;line-height:1.6;}
select.form-input{appearance:none;-webkit-appearance:none;cursor:pointer;}
.input-with-icon{position:relative;}
.input-with-icon .form-input{padding-left:40px;}
.input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  padding:8px 16px;border-radius:20px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text2);font-size:13px;
  cursor:pointer;transition:all .15s;font-family:var(--ff);font-weight:500;
}
.chip.active{
  background:var(--accent-bg);border-color:var(--accent);
  color:var(--accent2);box-shadow:0 0 12px var(--accent-glow);
}
.chip:active{transform:scale(.96);}

/* ── Sheet ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.sheet{
  background:var(--surface);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding:8px 20px calc(28px + env(safe-area-inset-bottom));
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow);
}
.sheet-handle{
  width:40px;height:4px;background:var(--border3);border-radius:2px;
  margin:8px auto 20px;
}
.sheet-title{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text);}
.sheet-actions{display:flex;gap:10px;margin-top:20px;padding-top:4px;}

/* ── Badge ── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim);}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(255,183,64,.2);}
.badge-blue{background:var(--accent-bg);color:var(--accent2);border:1px solid rgba(79,140,255,.2);}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,92,122,.2);}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.2);}
.badge-teal{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(45,212,191,.2);}

/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 0 16px;}
.cal-month-label{font-size:17px;font-weight:700;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-hdr{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;font-weight:600;}
.cal-cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:10px;font-size:13px;cursor:pointer;position:relative;
  transition:all .12s;color:var(--text2);
}
.cal-cell:active{transform:scale(.9);}
.cal-cell.today{color:var(--accent2);font-weight:700;}
.cal-cell.selected{background:var(--accent);color:#fff;font-weight:700;box-shadow:0 0 16px var(--accent-glow);}
.cal-cell.other{color:var(--text3);}
.cal-cell.has-exp::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--accent);
}
.cal-cell.has-diary::before{
  content:'';position:absolute;top:3px;right:4px;
  width:4px;height:4px;border-radius:50%;background:var(--purple);
}
.cal-cell.selected::after,.cal-cell.selected::before{background:rgba(255,255,255,.7);}

/* ── Day List ── */
.day-list-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);
  transition:all .15s;
}
.day-list-item:active{transform:scale(.98);opacity:.8;}
.day-list-item.type-exp{border-left:3px solid var(--accent);}
.day-list-item.type-diary{border-left:3px solid var(--purple);}
.dli-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:17px;flex-shrink:0;}
.dli-icon.exp{background:var(--accent-bg);}
.dli-icon.diary{background:var(--purple-bg);}
.dli-info{flex:1;min-width:0;}
.dli-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.dli-sub{font-size:11px;color:var(--text3);}
.dli-right{text-align:right;flex-shrink:0;}
.dli-amount{font-size:14px;font-weight:700;color:var(--text);}

/* ── Progress ── */
.progress{height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:12px 0;}

/* ── Sum row ── */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;}
.sum-label{font-size:13px;color:var(--text2);}
.sum-value{font-size:14px;font-weight:600;color:var(--text);}

/* ── Section header ── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;}
.sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}

/* ── Empty ── */
.empty{text-align:center;padding:56px 24px;color:var(--text3);}
.empty-icon{font-size:52px;margin-bottom:16px;opacity:.6;}
.empty-title{font-size:16px;color:var(--text2);margin-bottom:6px;font-weight:600;}
.empty-sub{font-size:13px;}

/* ── Detail screen ── */
.detail-photo{width:100%;border-radius:var(--radius);aspect-ratio:4/3;object-fit:cover;margin-bottom:16px;}
.detail-text{font-size:15px;line-height:1.8;color:var(--text);white-space:pre-wrap;}

/* ── Expense row ── */
.exp-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);}
.exp-row:last-child{border-bottom:none;}
.exp-icon-wrap{width:40px;height:40px;border-radius:12px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.exp-body{flex:1;min-width:0;}
.exp-name{font-size:14px;font-weight:600;color:var(--text);}
.exp-meta{font-size:11px;color:var(--text3);margin-top:3px;}
.exp-amt{text-align:right;flex-shrink:0;}
.exp-krw{font-size:14px;font-weight:700;color:var(--text);}
.exp-local{font-size:11px;color:var(--text3);}

/* ── Search bar ── */
.search-bar{
  display:flex;align-items:center;gap:10px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  padding:10px 14px;margin:0 0 12px;
}
.search-bar input{
  flex:1;background:none;border:none;color:var(--text);font-family:var(--ff);
  font-size:15px;outline:none;
}
.search-bar input::placeholder{color:var(--text3);}

/* ── Country dropdown ── */
.country-list{
  position:absolute;top:100%;left:0;right:0;background:var(--surface2);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  z-index:10;max-height:200px;overflow-y:auto;box-shadow:var(--shadow);
}
.country-item{padding:11px 14px;font-size:14px;cursor:pointer;transition:background .1s;}
.country-item:hover,.country-item:active{background:var(--surface3);}

/* ── Stat bar ── */
.stat-bar-row{margin-bottom:14px;}
.stat-bar-info{display:flex;justify-content:space-between;margin-bottom:5px;}
.stat-bar-label{font-size:13px;color:var(--text2);}
.stat-bar-val{font-size:13px;font-weight:700;color:var(--text);}

/* ── Spinner ── */
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Animations ── */
.fade-up{animation:fadeUp .22s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Glow dot ── */
.glow-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

/* ── Settings list ── */
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid var(--border);
}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:15px;color:var(--text);}
.setting-sub{font-size:12px;color:var(--text3);margin-top:2px;}

/* ── Pill tab ── */
.pill-tabs{display:flex;gap:6px;background:var(--surface2);border-radius:12px;padding:4px;}
.pill-tab{flex:1;text-align:center;padding:8px;border-radius:9px;font-size:13px;
  font-weight:600;cursor:pointer;color:var(--text3);transition:all .15s;border:none;background:none;font-family:var(--ff);}
.pill-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);}

/* ── KRW preview ── */
.krw-preview{
  font-size:13px;color:var(--green);margin-top:-10px;margin-bottom:12px;
  padding:8px 12px;background:var(--green-bg);border-radius:8px;
  border:1px solid var(--green-dim);
}

/* ── Notice ── */
.notice{
  padding:10px 14px;border-radius:8px;font-size:12px;color:var(--amber);
  background:var(--amber-bg);border:1px solid rgba(255,183,64,.15);margin-bottom:12px;
}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div class="screen active" id="sc-home">
  <div class="topbar">
    <div class="topbar-left">
      <div style="padding-left:8px;">
        <div style="font-size:18px;font-weight:700;background:linear-gradient(135deg,#7eb3ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">✈ Buen Camino</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="ibtn" onclick="toggleSearch('home')" title="검색">🔍</button>
      <button class="ibtn" onclick="nav('settings')" title="설정">⚙️</button>
      <button class="ibtn accent" onclick="openNewProject()" title="새 여행">＋</button>
    </div>
  </div>
  <div class="scroll" style="padding:16px;" id="home-scroll">
    <div id="home-search-bar" style="display:none;">
      <div class="search-bar"><span>🔍</span><input id="home-search-input" placeholder="여행 이름 검색…" oninput="filterProjects()" autocomplete="off" style="font-size:15px;"/></div>
    </div>
    <div id="project-list"></div>
    <div id="home-empty" class="empty" style="display:none;">
      <div class="empty-icon">🗺️</div>
      <div class="empty-title">첫 여행을 시작해볼까요?</div>
      <div class="empty-sub">＋ 버튼으로 새 프로젝트를 만드세요</div>
    </div>
  </div>
  <nav class="nav" id="nav-home">
    <button class="nav-btn active" onclick="nav('home')"><span class="nav-icon">🏠</span>홈</button>
    <button class="nav-btn" onclick="nav('stats')"><span class="nav-icon">📊</span>통계</button>
    <button class="nav-btn" onclick="nav('settings')"><span class="nav-icon">⚙️</span>설정</button>
  </nav>
</div>

<!-- PROJECT DETAIL -->
<div class="screen" id="sc-project">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="nav('home')">‹ 뒤로</button>
    </div>
    <div style="flex:1;text-align:center;">
      <div class="topbar-title" id="proj-topbar-title"></div>
    </div>
    <div class="topbar-right">
      <button class="ibtn" onclick="toggleSearch('project')" title="검색">🔍</button>
      <button class="ibtn accent" onclick="openSettle()" title="정산">💰</button>
    </div>
  </div>
  <div class="scroll" style="padding:16px;" id="proj-scroll">
    <div id="proj-search-bar" style="display:none;">
      <div class="search-bar"><span>🔍</span><input id="proj-search-input" placeholder="지출·일기 검색…" oninput="filterDayList()" autocomplete="off" style="font-size:15px;"/></div>
    </div>
    <div id="proj-summary-card"></div>
    <!-- Calendar -->
    <div class="card" style="padding:16px 12px;">
      <div class="cal-nav">
        <button class="ibtn" onclick="calPrev()">‹</button>
        <span class="cal-month-label" id="cal-month-label"></span>
        <button class="ibtn" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid" id="cal-hdr"></div>
      <div class="cal-grid" id="cal-grid" style="margin-top:4px;"></div>
      <!-- Legend -->
      <div style="display:flex;gap:16px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);">
          <span class="glow-dot" style="background:var(--accent);"></span>지출
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);">
          <span class="glow-dot" style="background:var(--purple);"></span>일기
        </div>
      </div>
    </div>
    <!-- Selected Day Panel -->
    <div id="day-panel" style="display:none;" class="fade-up">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0 12px;">
        <div>
          <div style="font-size:16px;font-weight:700;color:var(--text);" id="day-title"></div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px;" id="day-subtitle"></div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="openDiary()">📖 일기</button>
          <button class="btn btn-primary btn-sm" onclick="openAddExpense()">＋ 지출</button>
        </div>
      </div>
      <div id="day-list"></div>
    </div>
    <!-- Month list -->
    <div id="month-list"></div>
  </div>
</div>

<!-- DETAIL VIEW (diary/expense) -->
<div class="screen" id="sc-detail">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" id="detail-back-btn" onclick="closeDetail()">‹ 뒤로</button>
    </div>
    <div style="flex:1;text-align:center;">
      <div class="topbar-title" id="detail-title"></div>
    </div>
    <div class="topbar-right"></div>
  </div>
  <div class="scroll" style="padding:20px 16px 32px;" id="detail-content"></div>
  <div style="padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;" id="detail-actions"></div>
</div>

<!-- STATS -->
<div class="screen" id="sc-stats">
  <div class="topbar">
    <div class="topbar-left" style="padding-left:8px;">

let db;
function loadDB(){
  try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):defaultDB();}

}
function defaultDB(){
  return{projects:[],friends:[],categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),settings:{}};
}
function saveDB(){localStorage.setItem(STORAGE_KEY,JSON.stringify(db));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

db = loadDB();

// ═══════════════════════════════════════

// ═══════════════════════════════════════
let currentProject = null;
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selectedDate = null;

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function nav(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-'+screen).classList.add('active');
  if(screen==='home') renderHome();
  if(screen==='stats') renderStats();
  if(screen==='settings') renderSettings();
}

function openProjectScreen(id){
  currentProject = db.projects.find(p=>p.id===id);
  if(!currentProject) return;
  selectedDate = null;
  const sd = currentProject.startDate ? new Date(currentProject.startDate) : new Date();
  calYear = sd.getFullYear(); calMonth = sd.getMonth();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-project').classList.add('active');
  document.getElementById('proj-topbar-title').textContent = (currentProject.flag||'🌍')+' '+currentProject.name;
  renderProjSummary();
  renderCalendar();
  renderMonthList();

}

function showDetailScreen(title, contentHTML, actionsHTML, backFn){

function closeDetail(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

function toggleSearch(ctx){
  const bar = document.getElementById(ctx+'-search-bar');
  if(!bar) return;
  const hidden = bar.style.display==='none';
  bar.style.display = hidden ? '' : 'none';
  if(hidden){
    const inp = bar.querySelector('input');
    if(inp){inp.value='';inp.focus();}
  }
}

  empty.style.display='none';

    const total = projTotalKRW(p);
    const days = Object.keys(p.days||{}).length;
    const typeMap={solo:['나홀로','badge-blue'],group:['동반자','badge-green'],package:['패키지','badge-amber']};
    const [tLabel,tBadge] = typeMap[p.type]||['기타','badge-blue'];
    const members = (p.members||[]).slice(0,3).join(', ')+(p.members&&p.members.length>3?` 외 ${p.members.length-3}명`:'');

            ${p.country?`<span style="font-size:12px;color:var(--text3);">📍${p.country}</span>`:''}
            ${p.currency&&p.currency!=='KRW'?`<span style="font-size:12px;color:var(--text3);">${p.currency}</span>`:''}
          </div>
        </div>

          <div style="font-size:18px;font-weight:700;color:var(--text);">${fmtKRW(total)}</div>

  return Object.values(p.days||{}).reduce((s,d)=>(d.expenses||[]).reduce((a,e)=>a+(e.amountKRW||0),s),0);

let npMembers = [];

function openNewProject(){

function filterCountries(){
  const q = document.getElementById('np-country').value.trim();
  renderCountryList(q);
  showCountryList();
}
function showCountryList(){
  const q = (document.getElementById('np-country')||{}).value||'';
  renderCountryList(q);
}
function renderCountryList(q){
  const el = document.getElementById('np-country-list');
  if(!el) return;
  const list = q ? COUNTRIES.filter(c=>c.name.includes(q)) : COUNTRIES;
  el.style.display = list.length ? '' : 'none';
  el.innerHTML = list.map(c=>`<div class="country-item" onmousedown="selectCountry('${c.name}','${c.currency}','${c.flag}')">${c.flag} ${c.name} <span style="color:var(--text3);font-size:12px;">${c.currency}</span></div>`).join('');
}
function hideCountryList(){setTimeout(()=>{const el=document.getElementById('np-country-list');if(el)el.style.display='none';},200);}
function selectCountry(name,currency,flag){
  document.getElementById('np-country').value = name;
  document.getElementById('np-currency').value = currency;
  const el = document.getElementById('np-country-list');
  if(el) el.style.display='none';
  // store flag for later
  document.getElementById('np-country').dataset.flag = flag;
}

function syncFriendChips(){
  const active = [...document.querySelectorAll('#np-friend-chips .chip.active')].map(c=>c.dataset.v);
  active.forEach(n=>{if(!npMembers.includes(n))npMembers.push(n);});
  // remove unchecked
  const all = [...document.querySelectorAll('#np-friend-chips .chip')].map(c=>c.dataset.v);
  const inactive = all.filter(n=>!active.includes(n));
  inactive.forEach(n=>{npMembers=npMembers.filter(m=>m!==n);});
  renderNpMembers();
}
function addNpMember(){
  const inp = document.getElementById('np-mem-inp');
  const name = inp.value.trim();
  if(!name||npMembers.includes(name)) return;
  npMembers.push(name);
  inp.value='';
  renderNpMembers();
}
function removeNpMember(name){npMembers=npMembers.filter(m=>m!==name);renderNpMembers();}
function renderNpMembers(){
  const el=document.getElementById('np-mem-list');
  if(!el) return;
  el.innerHTML=npMembers.map(m=>`<span style="display:inline-flex;align-items:center;gap:5px;background:var(--accent-bg);border:1px solid var(--accent);border-radius:14px;padding:5px 12px;font-size:13px;color:var(--accent2);">${m}<button onclick="removeNpMember('${m}')" style="background:none;border:none;color:var(--accent2);cursor:pointer;font-size:14px;line-height:1;">×</button></span>`).join('');
}

function saveNewProject(){
  const name = document.getElementById('np-name').value.trim();
  if(!name){alert('여행 이름을 입력하세요.');return;}
  const type = getChip('np-type')||'solo';
  const countryEl = document.getElementById('np-country');
  const country = countryEl.value.trim();
  const currency = document.getElementById('np-currency').value;
  const start = document.getElementById('np-start').value;
  const flag = countryEl.dataset.flag || COUNTRIES.find(c=>c.name===country)?.flag || '🌍';

  npMembers.forEach(m=>{if(!db.friends.includes(m))db.friends.push(m);});

  const proj={id:uid(),name,type,country,currency,flag,startDate:start,members:[...npMembers],days:{},createdAt:Date.now()};
  db.projects.unshift(proj);
  npMembers=[];
  saveDB();
  closeSheet();
  openProjectScreen(proj.id);
}

// ═══════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════
function renderCalendar(){
  const mLabels=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-label').textContent=`${calYear}년 ${mLabels[calMonth]}`;

  const hdr=document.getElementById('cal-hdr');
  hdr.innerHTML=['일','월','화','수','목','금','토'].map(d=>`<div class="cal-day-hdr">${d}</div>`).join('');

  const first=new Date(calYear,calMonth,1).getDay();
  const last=new Date(calYear,calMonth+1,0).getDate();
  const today=todayStr();
  const p=currentProject;

  let html='';
  for(let i=0;i<first;i++){
    const d=new Date(calYear,calMonth,-(first-1-i));
    html+=`<div class="cal-cell other">${d.getDate()}</div>`;
  }
  for(let d=1;d<=last;d++){
    const ds=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const day=p&&p.days&&p.days[ds];
    const hasExp=day&&(day.expenses||[]).length>0;
    const hasDiary=day&&(day.diary||'').trim();
    let cls='cal-cell';
    if(ds===today) cls+=' today';
    if(ds===selectedDate) cls+=' selected';
    if(hasExp) cls+=' has-exp';
    if(hasDiary) cls+=' has-diary';
    html+=`<div class="${cls}" onclick="selectDate('${ds}')">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();renderMonthList();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();renderMonthList();}

function selectDate(ds){
  selectedDate=ds;
  renderCalendar();
  renderDayPanel();
  document.getElementById('day-panel').style.display='';
  // Scroll to panel
  setTimeout(()=>document.getElementById('day-panel').scrollIntoView({behavior:'smooth',block:'start'}),50);
}

function renderDayPanel(){
  if(!selectedDate||!currentProject) return;
  const dt=new Date(selectedDate+'T00:00:00');
  const dNames=['일','월','화','수','목','금','토'];
  document.getElementById('day-title').textContent=`${dt.getMonth()+1}월 ${dt.getDate()}일 (${dNames[dt.getDay()]})`;

  const day=currentProject.days[selectedDate]||{};
  const exps=day.expenses||[];
  const diary=day.diary||'';
  const photo=day.photo||null;

  document.getElementById('day-subtitle').textContent=exps.length?`지출 ${exps.length}건 · ${fmtKRW(totalKRW)}`:'기록 없음';

  const el=document.getElementById('day-list');

  if(diary){
    const preview=diary.slice(0,60)+(diary.length>60?'…':'');
    html+=`<div class="day-list-item type-diary" onclick="openDiaryDetail('${selectedDate}')">
      <div class="dli-icon diary">📖</div>
      <div class="dli-info">
        <div class="dli-title">일기</div>
        <div class="dli-sub">${preview}</div>
      </div>
      ${photo?`<img src="${photo}" style="width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;"/>`:'<span style="color:var(--text3);font-size:18px;">›</span>'}
    </div>`;
  }

  exps.forEach(e=>{
    const cat=db.categories.find(c=>c.id===e.categoryId)||{name:'기타',icon:'💡'};
    const sharedBadge=e.isShared?`<span class="badge badge-amber" style="font-size:10px;">공통</span>`:
      `<span class="badge badge-blue" style="font-size:10px;">개인</span>`;
    const localStr=e.amountLocal&&e.currency&&e.currency!=='KRW'?` · ${fmtLocal(e.amountLocal)}${e.currency}`:'';
    const catNames=(e.categoryIds||[e.categoryId]).map(id=>{
      const c=db.categories.find(c=>c.id===id);return c?c.icon+c.name:'';
    }).filter(Boolean).join(' + ');
    html+=`<div class="day-list-item type-exp" onclick="openExpDetail('${selectedDate}','${e.id}')">
      <div class="dli-icon exp">${cat.icon}</div>
      <div class="dli-info">
        <div class="dli-title">${catNames||cat.name}</div>
        <div class="dli-sub">${e.payer||'나'} ${sharedBadge}${localStr}</div>
      </div>
      <div class="dli-right">
        <div class="dli-amount">${fmtKRW(e.amountKRW||0)}</div>
      </div>
      <span style="color:var(--text3);font-size:18px;">›</span>
    </div>`;
  });

  if(!html) html=`<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">이 날의 기록이 없습니다</div>`;
  el.innerHTML=html;
}

function renderMonthList(){
  const p=currentProject;
  if(!p) return;
  const el=document.getElementById('month-list');
  const prefix=`${calYear}-${pad(calMonth+1)}`;
  const entries=Object.entries(p.days||{})
    .filter(([d])=>d.startsWith(prefix))
    .sort(([a],[b])=>a.localeCompare(b));

  if(!entries.length){el.innerHTML='';return;}

  let html=`<div class="sec-hdr"><span class="sec-title">${calYear}년 ${calMonth+1}월 전체 내역</span></div>`;
  entries.forEach(([date,day])=>{
    const dt=new Date(date+'T00:00:00');
    const dNames=['일','월','화','수','목','금','토'];
    const dLabel=`${dt.getMonth()+1}/${dt.getDate()}(${dNames[dt.getDay()]})`;
    const exps=day.expenses||[];
    const total=exps.reduce((s,e)=>s+(e.amountKRW||0),0);
    const hasDiary=(day.diary||'').trim();
    html+=`<div style="margin-bottom:8px;">
      <div style="font-size:12px;font-weight:700;color:var(--text3);padding:4px 2px 6px;">${dLabel}</div>
      ${hasDiary?`<div class="day-list-item type-diary" onclick="selectDate('${date}');openDiaryDetail('${date}')">
        <div class="dli-icon diary">📖</div>
        <div class="dli-info"><div class="dli-title">일기</div><div class="dli-sub">${(day.diary||'').slice(0,40)}</div></div>
        <span style="color:var(--text3);">›</span>
      </div>`:''}
      ${exps.map(e=>{
        const cat=db.categories.find(c=>c.id===e.categoryId)||{name:'기타',icon:'💡'};
        const catNames=(e.categoryIds||[e.categoryId]).map(id=>{ const c=db.categories.find(c=>c.id===id);return c?c.icon+c.name:'';}).filter(Boolean).join('+');
        return`<div class="day-list-item type-exp" onclick="selectDate('${date}');openExpDetail('${date}','${e.id}')">
          <div class="dli-icon exp">${cat.icon}</div>
          <div class="dli-info">
            <div class="dli-title">${catNames||cat.name}</div>
            <div class="dli-sub">${e.payer||'나'} · ${e.isShared?'공통':'개인'}</div>
          </div>
          <div class="dli-right"><div class="dli-amount">${fmtKRW(e.amountKRW||0)}</div></div>
          <span style="color:var(--text3);">›</span>
        </div>`;
      }).join('')}
    </div>`;
  });
  el.innerHTML=html;
}

function filterDayList(){
  const q=(document.getElementById('proj-search-input')||{}).value||'';
  // simple text highlight — re-render month list with filter
  if(!q){renderMonthList();return;}
  const p=currentProject;
  const el=document.getElementById('month-list');
  let html='<div class="sec-hdr"><span class="sec-title">검색 결과</span></div>';
  let found=false;
  Object.entries(p.days||{}).sort(([a],[b])=>a.localeCompare(b)).forEach(([date,day])=>{
    const exps=(day.expenses||[]).filter(e=>{
      const cat=db.categories.find(c=>c.id===e.categoryId)||{};
      return (cat.name||'').includes(q)||(e.memo||'').includes(q);
    });
    const hasDiary=(day.diary||'').includes(q)&&(day.diary||'').trim();
    if(!exps.length&&!hasDiary) return;
    found=true;
    const dt=new Date(date+'T00:00:00');
    const dNames=['일','월','화','수','목','금','토'];
    html+=`<div style="margin-bottom:8px;"><div style="font-size:12px;font-weight:700;color:var(--text3);padding:4px 2px 6px;">${dt.getMonth()+1}/${dt.getDate()}(${dNames[dt.getDay()]})</div>
      ${hasDiary?`<div class="day-list-item type-diary" onclick="openDiaryDetail('${date}')"><div class="dli-icon diary">📖</div><div class="dli-info"><div class="dli-title">일기</div></div></div>`:''}
      ${exps.map(e=>{const cat=db.categories.find(c=>c.id===e.categoryId)||{name:'기타',icon:'💡'};
        return`<div class="day-list-item type-exp" onclick="openExpDetail('${date}','${e.id}')">
          <div class="dli-icon exp">${cat.icon}</div>
          <div class="dli-info"><div class="dli-title">${cat.name}</div></div>
          <div class="dli-right"><div class="dli-amount">${fmtKRW(e.amountKRW||0)}</div></div></div>`;
      }).join('')}
    </div>`;
  });
  if(!found) html+=`<div class="empty" style="padding:32px;"><div class="empty-icon" style="font-size:32px;">🔍</div><div class="empty-sub">검색 결과 없음</div></div>`;
  el.innerHTML=html;
}

let diaryPhotoData = null;
function previewDiaryPhoto(inp){
  const file=inp.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    diaryPhotoData=e.target.result;
    // show preview
    const wrap=document.getElementById('diary-photo-preview');
    const img=document.getElementById('diary-photo-img')||wrap.querySelector('img');
    if(img){img.src=diaryPhotoData;}
    if(wrap){wrap.style.display='';}
  };
  reader.readAsDataURL(file);
}
function removeDiaryPhoto(){
  diaryPhotoData=null;
  const wrap=document.getElementById('diary-photo-preview');
  if(wrap) wrap.style.display='none';
}

function saveDiary(){
  const p=currentProject;
  if(!p||!selectedDate){alert('날짜를 선택하세요.');return;}
  const txt=document.getElementById('diary-txt').value;
  if(!p.days[selectedDate]) p.days[selectedDate]={expenses:[],diary:'',photo:null};
  p.days[selectedDate].diary=txt;
  if(diaryPhotoData!==null) p.days[selectedDate].photo=diaryPhotoData;
  diaryPhotoData=null;
  saveDB();
  closeSheet();
  renderCalendar();
  renderDayPanel();
  renderMonthList();
}

function openDiaryDetail(date){
  const p=currentProject;
  if(!p) return;

function deleteDiary(date){

function updateExpPreview(){
  const p=currentProject;
  const currency=p?p.currency||'KRW':'KRW';
  const isLocal=currency!=='KRW';
  if(!isLocal) return;
  const amt=parseFloat(document.getElementById('ae-amt')?.value)||0;
  const rate=parseFloat(document.getElementById('ae-rate')?.value)||0;
  const prev=document.getElementById('ae-krw-preview');
  if(!prev) return;
  if(amt&&rate){
    prev.style.display='';
    prev.textContent=`₩ ${fmtKRW(Math.round(amt*rate))} (${fmtLocal(amt)} ${currency} × ${fmtLocal(rate)})`;
  } else {
    prev.style.display='none';
  }
}

async function fetchRate(currency, dateStr){
  const spin=document.getElementById('ae-rate-spin');
  if(spin) spin.style.display='';
  try{
    // Try historical rate
    const url=`https://api.frankfurter.app/${dateStr}?from=${currency}&to=KRW`;
    const res=await fetch(url);
    if(res.ok){
      const data=await res.json();
      const rate=data.rates&&data.rates.KRW;
      if(rate){setRateInput(Math.round(rate));return;}
    }
  }catch{}
  try{
    const url2=`https://api.frankfurter.app/latest?from=${currency}&to=KRW`;
    const res2=await fetch(url2);
    if(res2.ok){
      const data2=await res2.json();
      const rate2=data2.rates&&data2.rates.KRW;
      if(rate2) setRateInput(Math.round(rate2));
    }
  }catch{}
  finally{if(spin) spin.style.display='none';}
}

function setRateInput(val){
  const inp=document.getElementById('ae-rate');
  if(inp){inp.value=val;updateExpPreview();}
  const spin=document.getElementById('ae-rate-spin');
  if(spin) spin.style.display='none';
}

function saveExp(expId){
  const p=currentProject;
  if(!p||!selectedDate){alert('오류: 날짜가 선택되지 않았습니다.');return;}

  // Get selected cats (multi)
  const catIds=[...document.querySelectorAll('#ae-cats .chip.active')].map(c=>c.dataset.v);
  if(!catIds.length){alert('지출 항목을 하나 이상 선택하세요.');return;}

  const currency=p.currency||'KRW';
  const isLocal=currency!=='KRW';
  const amtStr=document.getElementById('ae-amt').value;
  const amtLocal=parseFloat(amtStr)||0;
  if(!amtLocal){alert('금액을 입력하세요.');return;}

  const rate=isLocal?(parseFloat(document.getElementById('ae-rate')?.value)||1):1;
  const amtKRW=isLocal?Math.round(amtLocal*rate):amtLocal;
  const payType=getChip('ae-pay')||'card';
  const payer=getChip('ae-payer')||'나';
  const sharedVal=getChip('ae-shared');
  const isShared=sharedVal==='shared';
  const memo=document.getElementById('ae-memo').value.trim();

  // Primary cat is first selected
  const categoryId=catIds[0];

  if(!p.days[selectedDate]) p.days[selectedDate]={expenses:[],diary:'',photo:null};

  const record={categoryId,categoryIds:catIds,amountLocal,amountKRW:amtKRW,
    currency,exchangeRate:isLocal?rate:null,payType,payer,isShared,memo,
    date:selectedDate};

  if(expId){
    const idx=(p.days[selectedDate].expenses||[]).findIndex(e=>e.id===expId);
    if(idx>=0) p.days[selectedDate].expenses[idx]={...p.days[selectedDate].expenses[idx],...record};
  } else {
    if(!p.days[selectedDate].expenses) p.days[selectedDate].expenses=[];
    p.days[selectedDate].expenses.push({id:uid(),...record,createdAt:Date.now()});
  }

  saveDB();
  closeSheet();
  renderProjSummary();
  renderCalendar();
  renderDayPanel();
  renderMonthList();
}

function deleteExp(expId){
  if(!confirm('이 지출을 삭제할까요?')) return;
  const p=currentProject;
  if(!p||!selectedDate) return;
  const day=p.days[selectedDate];
  if(day) day.expenses=(day.expenses||[]).filter(e=>e.id!==expId);

}

    <button class="btn btn-ghost" style="flex:1;" onclick="selectedDate='${date}';closeDetail();openAddExpense('${expId}')">✏️ 수정</button>
    <button class="btn btn-danger" style="flex:1;" onclick="deleteExp('${expId}')">🗑 삭제</button>
  `;
  showDetailScreen(title,content,actions,()=>{
    if(date!==selectedDate){selectedDate=date;renderCalendar();renderDayPanel();}
  });
}

// ═══════════════════════════════════════
// SETTLEMENT
// ═══════════════════════════════════════
function openSettle(){
  const p=currentProject;
  if(!p) return;
  const dates=Object.keys(p.days||{}).sort();
  const minDate=dates[0]||todayStr();
  const maxDate=dates[dates.length-1]||todayStr();

  showSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">💰 정산</div>
    <div style="display:flex;gap:10px;margin-bottom:16px;">
      <div class="form-group" style="flex:1;margin-bottom:0;">
        <label class="form-label">시작일</label>
        <input class="form-input" id="st-from" type="date" value="${minDate}" style="font-size:16px;" onchange="calcSettle()"/>
      </div>
      <div class="form-group" style="flex:1;margin-bottom:0;">
        <label class="form-label">종료일</label>
        <input class="form-input" id="st-to" type="date" value="${maxDate}" style="font-size:16px;" onchange="calcSettle()"/>
      </div>
    </div>
    <div id="settle-result"></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeSheet()">닫기</button>
      <button class="btn btn-success" style="flex:1;" onclick="shareSettle()">📤 공유</button>
    </div>
  `);
  calcSettle();
}

function calcSettle(){
  const p=currentProject;
  if(!p) return;
  const from=document.getElementById('st-from')?.value||'';
  const to=document.getElementById('st-to')?.value||'';
  const members=['나',...(p.members||[])];
  const n=members.length||1;

  let allExps=[];
  Object.entries(p.days||{}).forEach(([date,day])=>{
    if(date>=from&&date<=to)(day.expenses||[]).forEach(e=>allExps.push({...e,date}));
  });

  const grandTotal=allExps.reduce((s,e)=>s+(e.amountKRW||0),0);
  const sharedExps=allExps.filter(e=>e.isShared);
  const sharedTotal=sharedExps.reduce((s,e)=>s+(e.amountKRW||0),0);
  const personalTotal=grandTotal-sharedTotal;
  const sharedPer=Math.round(sharedTotal/Math.max(n,1));

  // per payer: how much they paid in shared
  const paid={};members.forEach(m=>paid[m]=0);
  sharedExps.forEach(e=>{const payer=e.payer||'나';if(paid[payer]!==undefined)paid[payer]+=(e.amountKRW||0);});

  // balance = paid - owed (sharedPer)
  const balance={};members.forEach(m=>{balance[m]=(paid[m]||0)-sharedPer;});

  // Day breakdown
  const dayRows=Object.entries(p.days||{})
    .filter(([d])=>d>=from&&d<=to&&(p.days[d].expenses||[]).length)
    .sort(([a],[b])=>a.localeCompare(b))
    .map(([date,day])=>{
      const dt=new Date(date+'T00:00:00');
      const tot=(day.expenses||[]).reduce((s,e)=>s+(e.amountKRW||0),0);
      return`<div class="sum-row"><span class="sum-label">${dt.getMonth()+1}/${dt.getDate()}</span><span class="sum-value">${fmtKRW(tot)}</span></div>`;
    }).join('');

  const el=document.getElementById('settle-result');
  el.innerHTML=`
  <div class="card" style="margin-bottom:10px;">
    <div style="font-size:13px;color:var(--text3);margin-bottom:4px;">기간 총 지출</div>
    <div style="font-size:24px;font-weight:700;margin-bottom:12px;">${fmtKRW(grandTotal)}</div>
    <div class="sum-row"><span class="sum-label">개인 지출 합계</span><span class="sum-value" style="color:var(--accent2);">${fmtKRW(personalTotal)}</span></div>
    <div class="sum-row"><span class="sum-label">공통 지출 합계</span><span class="sum-value" style="color:var(--amber);">${fmtKRW(sharedTotal)}</span></div>
    ${n>1?`<div class="sum-row"><span class="sum-label">1인당 공통 부담</span><span class="sum-value" style="color:var(--green);font-size:16px;font-weight:700;">${fmtKRW(sharedPer)}</span></div>`:''}
  </div>
  ${n>1?`<div class="card" style="margin-bottom:10px;">
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;font-weight:700;">정산 내역</div>
    ${members.map(m=>{
      const b=balance[m];
      const cls=b>=0?'badge-green':'badge-red';
      const label=b>=0?`+${fmtKRW(b)} 받을 돈`:`${fmtKRW(Math.abs(b))} 낼 돈`;
      return`<div class="sum-row"><span style="font-size:14px;color:var(--text);">👤 ${m}</span><span class="badge ${cls}">${label}</span></div>`;
    }).join('')}
  </div>`:''}
  ${dayRows?`<div class="card">
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;font-weight:700;">일별 내역</div>
    ${dayRows}
  </div>`:''}`;
}

function shareSettle(){
  const p=currentProject;
  if(!p) return;
  const from=document.getElementById('st-from')?.value||'';
  const to=document.getElementById('st-to')?.value||'';
  const members=['나',...(p.members||[])];
  const n=members.length||1;
  let allExps=[];
  Object.entries(p.days||{}).forEach(([date,day])=>{
    if(date>=from&&date<=to)(day.expenses||[]).forEach(e=>allExps.push({...e,date}));
  });
  const grandTotal=allExps.reduce((s,e)=>s+(e.amountKRW||0),0);
  const sharedTotal=allExps.filter(e=>e.isShared).reduce((s,e)=>s+(e.amountKRW||0),0);
  const lines=[
    `✈️ ${p.flag||''} ${p.name} 정산`,
    `📅 ${from} ~ ${to}`,
    ``,
    `💰 총 지출: ${fmtKRW(grandTotal)}`,
    `👥 공통 지출: ${fmtKRW(sharedTotal)}`,
    n>1?`👤 1인당 부담: ${fmtKRW(Math.round(sharedTotal/n))}`:'',
    ``,
    `— Buen Camino`,
  ].filter(l=>l!==undefined);
  const txt=lines.join('\n');
  if(navigator.share) navigator.share({title:'',text:txt});
  else{navigator.clipboard?.writeText(txt);alert('클립보드에 복사됐어요!');}
}

// ═══════════════════════════════════════
// STATS
// ═══════════════════════════════════════
function renderStats(){
  const el=document.getElementById('stats-content');
  if(!db.projects.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">여행 기록이 없습니다</div></div>`;
    return;
  }

  const allExps=[];
  db.projects.forEach(p=>{
    Object.values(p.days||{}).forEach(d=>{
      (d.expenses||[]).forEach(e=>allExps.push({...e,pName:p.name,flag:p.flag}));
    });
  });

  const grandTotal=allExps.reduce((s,e)=>s+(e.amountKRW||0),0);

  // By category
  const byCat={};
  allExps.forEach(e=>{
    (e.categoryIds||[e.categoryId]).forEach(id=>{
      const cat=db.categories.find(c=>c.id===id)||{name:'기타',icon:'💡'};
      if(!byCat[cat.name]){byCat[cat.name]={icon:cat.icon,total:0,count:0};}
      byCat[cat.name].total+=(e.amountKRW||0)/((e.categoryIds||[e.categoryId]).length);
      byCat[cat.name].count++;
    });
  });
  const catSorted=Object.entries(byCat).sort((a,b)=>b[1].total-a[1].total).slice(0,8);
  const maxCat=catSorted[0]?.[1]?.total||1;

  // By project
  const projStats=db.projects.map(p=>{
    const total=projTotalKRW(p);
    const pct=grandTotal?Math.round(total/grandTotal*100):0;
    return{...p,total,pct};
  }).filter(p=>p.total>0).sort((a,b)=>b.total-a.total);

  el.innerHTML=`
  <div class="card" style="margin-bottom:16px;background:linear-gradient(135deg,var(--surface),var(--surface2));border-color:var(--border2);">
    <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">전체 여행 지출</div>
    <div style="font-size:30px;font-weight:700;color:var(--text);">${fmtKRW(grandTotal)}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:4px;">${db.projects.length}개 프로젝트 · ${allExps.length}건</div>
  </div>

  <div class="sec-hdr"><span class="sec-title">카테고리별 지출</span></div>
  <div class="card" style="margin-bottom:16px;">
    ${catSorted.map(([name,info])=>{
      const pct=Math.round(info.total/maxCat*100);
      return`<div class="stat-bar-row">
        <div class="stat-bar-info">
          <span class="stat-bar-label">${info.icon} ${name}</span>
          <span class="stat-bar-val">${fmtKRW(Math.round(info.total))}</span>
        </div>
        <div class="progress"><div class="progress-fill" style="width:${pct}%;"></div></div>
      </div>`;
    }).join('')}
  </div>

  ${projStats.length?`<div class="sec-hdr"><span class="sec-title">여행별 지출</span></div>
  <div class="card">
    ${projStats.map(p=>`<div class="sum-row">
      <div><div style="font-size:14px;color:var(--text);">${p.flag||'🌍'} ${p.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px;">${p.pct}%</div></div>
      <div style="font-weight:700;font-size:15px;">${fmtKRW(p.total)}</div>
    </div>`).join('')}
  </div>`:''}`;
}

  <div class="card" style="margin-bottom:16px;">
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;" id="friend-chips">
      ${db.friends.map(f=>`<span style="display:inline-flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:5px 12px;font-size:13px;color:var(--text2);">${f}<button onclick="delFriend('${f}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;">×</button></span>`).join('')}
    </div>
    <div style="display:flex;gap:8px;">
      <input class="form-input" id="new-friend" placeholder="이름 입력" style="flex:1;font-size:16px;" autocomplete="off" onkeydown="if(event.key==='Enter')addFriend()"/>
      <button class="btn btn-ghost btn-sm" style="flex-shrink:0;padding:0 16px;" onclick="addFriend()">추가</button>
    </div>
  </div>

  <div class="sec-hdr">
    <span class="sec-title">지출 항목</span>
    <button class="btn btn-ghost btn-sm" onclick="openAddCat()">＋ 추가</button>
  </div>
  ${groups.map(g=>`<div class="card" style="margin-bottom:10px;">
    <div style="font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;">${g}</div>
    ${db.categories.filter(c=>c.group===g).map(c=>`<div class="setting-row">
      <div>${c.icon} <span class="setting-label">${c.name}</span></div>
      <button class="btn btn-danger btn-sm" onclick="delCat('${c.id}')">삭제</button>
    </div>`).join('')}
  </div>`).join('')}

  <div class="sec-hdr"><span class="sec-title">데이터</span></div>
  <div class="card">
    <div class="setting-row">
      <div><div class="setting-label">JSON 내보내기</div><div class="setting-sub">백업용</div></div>
      <button class="btn btn-ghost btn-sm" onclick="exportData()">내보내기</button>
    </div>
    <div class="setting-row">
      <div><div class="setting-label" style="color:var(--red);">전체 초기화</div><div class="setting-sub">되돌릴 수 없음</div></div>
      <button class="btn btn-danger btn-sm" onclick="resetAll()">초기화</button>
    </div>
  </div>
  <div style="text-align:center;padding:24px;color:var(--text3);font-size:12px;">Buen Camino v2.0 · 작은앱공방</div>`;
}

function addFriend(){
  const inp=document.getElementById('new-friend');
  const name=inp.value.trim();
  if(!name||db.friends.includes(name)) return;
  db.friends.push(name);inp.value='';saveDB();renderSettings();
}
function delFriend(name){db.friends=db.friends.filter(f=>f!==name);saveDB();renderSettings();}
function delCat(id){if(!confirm('삭제할까요?'))return;db.categories=db.categories.filter(c=>c.id!==id);saveDB();renderSettings();}
function openAddCat(){
  showSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">지출 항목 추가</div>
    <div class="form-group"><label class="form-label">이모지 아이콘</label>
      <input class="form-input" id="nc-icon" placeholder="예: 🎭" style="font-size:24px;text-align:center;" maxlength="2" autocomplete="off"/></div>
    <div class="form-group"><label class="form-label">항목 이름</label>
      <input class="form-input" id="nc-name" placeholder="예: 공연·관람" style="font-size:16px;" autocomplete="off"/></div>
    <div class="form-group"><label class="form-label">그룹</label>
      <select class="form-input" id="nc-group" style="font-size:16px;">
        <option value="기본">기본</option><option value="골프">골프</option>
        <option value="비즈니스">비즈니스</option><option value="가족">가족</option><option value="기타">기타</option>
      </select></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeSheet()">취소</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveCat()">추가</button>
    </div>
  `);
}
function saveCat(){
  const icon=document.getElementById('nc-icon').value.trim()||'💡';
  const name=document.getElementById('nc-name').value.trim();
  if(!name){alert('이름을 입력하세요.');return;}
  const group=document.getElementById('nc-group').value;
  db.categories.push({id:uid(),name,icon,group});
  saveDB();closeSheet();renderSettings();
}
function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`buencamino_${todayStr()}.json`;a.click();
  URL.revokeObjectURL(url);
}
function resetAll(){
  if(!confirm('정말 모든 데이터를 삭제할까요?')) return;
  db=defaultDB();saveDB();
  nav('home');renderSettings();
}

// SHEET

function showSheet(html){
  document.getElementById('overlay-root').innerHTML=`
    <div class="overlay" id="sheet-overlay" onclick="overlayTap(event)">
      <div class="sheet fade-up">${html}</div>
    </div>`;
}
function closeSheet(){document.getElementById('overlay-root').innerHTML='';}
function overlayTap(e){if(e.target.id==='sheet-overlay')closeSheet();}

// ═══════════════════════════════════════
// CHIPS
// ═══════════════════════════════════════
function pickChip(btn,groupId){
  document.querySelectorAll('#'+groupId+' .chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
}
function getChip(groupId){
  const el=document.querySelector('#'+groupId+' .chip.active');
  return el?el.dataset.v:null;
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function todayStr(){
  const d=new Date();
  return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n){return String(n).padStart(2,'0');}
function fmtKRW(n){return'₩'+Math.round(n).toLocaleString();}
function fmtLocal(n){if(!n&&n!==0)return'';return(Math.round(n*100)/100).toLocaleString();}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
